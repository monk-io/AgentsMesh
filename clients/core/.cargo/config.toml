# iOS cross-compile defaults.
# Xcode 15+ rejects `-fembed-bitcode` (Bitcode was removed in iOS 14);
# force embed-bitcode=no to avoid linker warnings on device/sim builds.
[target.aarch64-apple-ios]
rustflags = ["-C", "embed-bitcode=no"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "embed-bitcode=no"]

[target.x86_64-apple-ios]
rustflags = ["-C", "embed-bitcode=no"]
