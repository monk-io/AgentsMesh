[package]
name = "agentsmesh-ffi"
description = "FFI layer: UniFFI (Swift/Kotlin) + WASM bindgen"
version.workspace = true
edition.workspace = true

[lib]
# staticlib → iOS XCFramework; cdylib → desktop dynamic linking;
# rlib → downstream Rust crates (tests, integration crates).
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
agentsmesh-types = { workspace = true }
agentsmesh-api-client = { workspace = true }
agentsmesh-auth = { workspace = true }
agentsmesh-protocol = { workspace = true }
agentsmesh-services = { workspace = true }
agentsmesh-state = { workspace = true }
uniffi = { workspace = true, features = ["tokio"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
