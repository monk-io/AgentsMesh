[package]
name = "agentsmesh-local-runner"
description = "Desktop-side orchestration of the local agentsmesh-runner binary (CLI + OS service lifecycle)"
version.workspace = true
edition.workspace = true

# Desktop-only crate. Intentionally NOT depended on by the wasm or ffi crates
# so the web bundle and iOS XCFramework do not pick up process-spawning code
# (web sandbox / iOS sandbox forbid it).

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true }
dirs = "6"
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
zip = { version = "5", default-features = false, features = ["deflate"] }

[dev-dependencies]
tokio-test = { workspace = true }
