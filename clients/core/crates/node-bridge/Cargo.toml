[package]
name = "agentsmesh-node-bridge"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi9", "async", "tokio_rt", "serde-json"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

agentsmesh-services = { path = "../services" }
agentsmesh-auth = { path = "../auth" }
agentsmesh-api-client = { path = "../api-client" }
agentsmesh-state = { path = "../state" }
agentsmesh-types = { path = "../types" }
dirs = "6"

[build-dependencies]
napi-build = "2"
