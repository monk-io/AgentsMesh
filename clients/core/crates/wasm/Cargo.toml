[package]
name = "agentsmesh-wasm"
version.workspace = true
edition.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
agentsmesh-types = { path = "../types" }
agentsmesh-protocol = { path = "../protocol" }
agentsmesh-state = { path = "../state" }
agentsmesh-services = { path = "../services" }
agentsmesh-auth = { path = "../auth" }
agentsmesh-api-client = { path = "../api-client" }
agentsmesh-persistence = { path = "../persistence" }
agentsmesh-relay = { path = "../relay" }
agentsmesh-events = { path = "../events" }
agentsmesh-transport = { path = "../transport" }

wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
console_error_panic_hook = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
js-sys = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart"] }
web-sys = { workspace = true, features = [
    "WebSocket",
    "MessageEvent",
    "ErrorEvent",
    "CloseEvent",
    "BinaryType",
    "Window",
    "Storage",
    "console",
] }
