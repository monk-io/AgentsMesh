# electron-builder configuration for AgentsMesh Desktop.
#
# Driven by `bazel build //clients/desktop:dist` via the
# `electron_builder_app` macro in build_defs/web/electron.bzl. The
# macro stages out/ + the thin-shell package.json + the runtime
# node_modules subtree into a sandbox CWD, then invokes electron-builder
# from there.
#
# `package.json` in this directory is intentionally a thin shell — it
# carries `name`/`version`/`main`/`build` only. electron-builder reads
# `appId` / target lists from THIS file; binary metadata (productName)
# is overridden here so we don't have to maintain a duplicate value
# in package.json.

appId: ai.agentsmesh.desktop
productName: AgentsMesh
copyright: Copyright © 2026 AgentsMesh

# Pin the Electron runtime version directly. The thin-shell
# `package.json` has no `devDependencies.electron` (deps are hoisted to
# the workspace root), so electron-builder can't infer this from
# `node_modules/electron/package.json` walking up from CWD inside a
# Bazel sandbox. Bump in lockstep with the workspace root.
electronVersion: 33.4.11

directories:
  # `output` is interpreted relative to `projectDir`. The Bazel macro
  # sets `--projectDir <name>_staging` (a read-only `copy_to_directory`
  # tree artifact); writing inside it fails with EACCES. `../<dist_dir>`
  # escapes back to the package-level chdir, where Bazel has allocated
  # the writable `dist/` tree artifact this rule declares.
  output: ../dist
  buildResources: build

files:
  - out/**/*
  - package.json
  - "!**/*.{md,map,ts,tsx}"
  - "!**/.DS_Store"

# asar packs all renderer/main bundles into one archive. We unpack the
# native NAPI addon — Electron can't dlopen a `.node` file from inside
# an asar archive.
asar: true
asarUnpack:
  - "**/@agentsmesh/node-bridge/**/*.node"
  - "**/*.node"

# We package the native binary ourselves in the staging step; tell
# electron-builder to skip its electron-rebuild pass.
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  # codesign / notarization wired via env vars in CI:
  # CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
  identity: null

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
  category: Development

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
