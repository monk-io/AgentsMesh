# DEPRECATED --- Bazel migration
# Replacement: //clients/ios:AgentsMesh_xcodeproj (generated via rules_xcodeproj)
# Kept until .github/workflows/bazel.yml is authoritative, then delete.
#
# Declarative Xcode project spec consumed by XcodeGen (brew install xcodegen).
# Produces `AgentsMesh.xcodeproj`. The project references the local SPM
# packages under `Packages/` — everything outside the Xcode project
# (Rust, Swift reducers, tests) lives as SPM so it stays tool-agnostic.
name: AgentsMesh
options:
  bundleIdPrefix: ai.agentsmesh
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  AgentsMeshFeatures:
    path: Packages/AgentsMeshFeatures

targets:
  AgentsMesh:
    type: application
    platform: iOS
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchStoryboardName: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.agentsmesh.ios
        TARGETED_DEVICE_FAMILY: "1,2"       # iPhone + iPad
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO   # needed for SPM build plugins
        AGENTSMESH_API_URL: "https://api.agentsmesh.ai"
    dependencies:
      - package: AgentsMeshFeatures
        product: AppFeature
      - package: AgentsMeshFeatures
        product: AuthFeature
      - package: AgentsMeshFeatures
        product: WorkspaceFeature
      - package: AgentsMeshFeatures
        product: TerminalFeature
