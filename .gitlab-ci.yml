# =============================================================================
# Deploy Stage - China Production (auto-deploy on main)
# =============================================================================
# China production deploys automatically after build succeeds on main branch.
# DEPLOY_VERSION defaults to CI_COMMIT_SHORT_SHA but can be overridden for rollback.

# Deploy Backend to China Production
deploy:cn-prod:backend:
  stage: deploy
  needs:
    - job: build-backend
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Backend ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service backend --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Deploy Web to China Production
deploy:cn-prod:web:
  stage: deploy
  needs:
    - job: build-web
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Deploying Web ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web/**/*
        - ci/web.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Deploy Web-Admin to China Production
deploy:cn-prod:web-admin:
  stage: deploy
  needs:
    - job: build-web-admin
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://admin.agentsmesh.cn
  script:
    - echo "Deploying Web-Admin ${DEPLOY_VERSION} to China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web-admin --version ${DEPLOY_VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web-admin/**/*
        - ci/web-admin.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Deploy Relay: cn-relay-01
deploy:cn-prod:cn-relay-01:
  stage: deploy
  needs:
    - job: build-relay
  tags:
    - deploy
    - linux
  variables:
    DEPLOY_VERSION: "${CI_COMMIT_SHORT_SHA}"
  environment:
    name: cn-production
    url: https://01.relay.agentsmesh.cn:8443
  script:
    - echo "Deploying cn-relay-01 ${DEPLOY_VERSION}..."
    - ssh aliyun-cn-relay-01 "cd /opt/agentsmesh && git pull origin main"
    - ssh aliyun-cn-relay-01 "cd /opt/agentsmesh/relay && ./deploy.sh cn-relay-01 --pull"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - relay/**/*
        - ci/relay.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Database Migration - China Production (auto after backend deploy)
# =============================================================================
# Runs automatically after backend deployment when migration files change.
# Migration runs AFTER backend deploy to ensure the new binary is in place.

# Database Migration for China Production
migrate:cn-prod:
  stage: deploy
  needs:
    - job: deploy:cn-prod:backend
  tags:
    - deploy
    - linux
  variables:
    MIGRATE_DIRECTION: "up"
    MIGRATE_STEPS: ""
  environment:
    name: cn-production
    url: https://agentsmesh.cn
  script:
    - echo "Running database migration (${MIGRATE_DIRECTION}) on China Production..."
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && git pull origin main"
    - ssh root@aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --direction ${MIGRATE_DIRECTION} ${MIGRATE_STEPS:+--steps $MIGRATE_STEPS}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/migrations/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

