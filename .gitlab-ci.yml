# GitLab CI pipeline for the corporate (China) build + deploy flow.
# Mirrors .github/workflows/release.yml but pushes to the internal
# `registry.corp.agentsmesh.ai` registry and rolls out via ssh.
#
# Image build strategy:
#   All services (backend / runner / relay / web / web-admin) build via
#   Bazel rules_oci. Each BUILD.bazel exposes `//<target>:image_push_corp`
#   (see build_defs/docker/go_oci_image.bzl and build_defs/web/next_oci.bzl
#   for the dict layout). Tags are stamped from
#   `build_defs/workspace_status.sh` using IMAGE_VERSION / IMAGE_MINOR.

# Runner release pipeline (triggered by tags only).
include:
  - local: 'runner/.gitlab-ci.yml'
    rules:
      - if: $CI_COMMIT_TAG

variables:
  REGISTRY: registry.corp.agentsmesh.ai
  GO_VERSION: "1.25"
  # China-friendly package mirrors for the `test-*` jobs below.
  GOPROXY: "https://goproxy.cn,https://goproxy.io,direct"
  NPM_REGISTRY: "https://repo.huaweicloud.com/repository/npm/"

stages:
  - test
  - build
  - deploy

# =============================================================================
# Shared anchors — Bazel OCI build/push boilerplate.
# =============================================================================
#
# The CI image must provide:
#   - bazel / bazelisk on PATH
#   - docker CLI (rules_oci shells out to `docker` only if you use oci_load;
#     `oci_push` talks to the registry directly)
#   - git + bash
#
# We reuse the corp-mirrored Bazel image. If that mirror is unavailable,
# swap in any image with `bazel` on PATH — no other tooling required.

.bazel-defaults: &bazel-defaults
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/bazel:latest
  variables:
    # Bazel outputs under /tmp survive a warm runner, and CI disk caches
    # can be wired to GitLab's cache: declaration if desired.
    BAZEL_DISK_CACHE: /tmp/bazel-disk-cache

.bazel-push: &bazel-push
  <<: *bazel-defaults
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  variables:
    BAZEL_DISK_CACHE: /tmp/bazel-disk-cache
    DOCKER_HOST: tcp://docker:2375
  before_script:
    # rules_oci reads ~/.docker/config.json for registry auth.
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

# =============================================================================
# Test Stage — Run on MR pipelines
# =============================================================================

test-backend:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  services:
    - name: ${REGISTRY}/library/postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test
        POSTGRES_DB: agentsmesh_test
    - name: ${REGISTRY}/library/redis:7-alpine
      alias: redis
  variables:
    DATABASE_URL: "postgres://test:test@postgres:5432/agentsmesh_test?sslmode=disable"
    REDIS_URL: "redis://redis:6379"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd backend
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.out
      - backend/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
        - proto/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

test-web:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd clients/web
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm test:run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: clients/web/report.xml
      coverage_report:
        coverage_format: cobertura
        path: clients/web/coverage/cobertura-coverage.xml
    paths:
      - clients/web/coverage/
      - clients/web/report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

test-web-admin:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd clients/web-admin
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web-admin/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

test-runner:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd runner
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: runner/report.xml
      coverage_report:
        coverage_format: cobertura
        path: runner/coverage.xml
    paths:
      - runner/coverage.out
      - runner/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

test-relay:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd relay
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
