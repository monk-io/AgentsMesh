    - docker push ${WEB_ADMIN_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_ADMIN_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web-admin/**/*
        - ci/web-admin.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build runner image
build-runner:
  stage: build
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
