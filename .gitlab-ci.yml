# Include runner release pipeline (triggered by tags)
include:
  - local: 'runner/.gitlab-ci.yml'
    rules:
      - if: $CI_COMMIT_TAG

variables:
  REGISTRY: registry.corp.agentsmesh.ai
  BACKEND_IMAGE: ${REGISTRY}/agentsmesh/backend
  WEB_IMAGE: ${REGISTRY}/agentsmesh/web
  WEB_ADMIN_IMAGE: ${REGISTRY}/agentsmesh/web-admin
  RUNNER_IMAGE: ${REGISTRY}/agentsmesh/runner
  RELAY_IMAGE: ${REGISTRY}/agentsmesh/relay
  VERSION: ${CI_COMMIT_TAG:-dev}
  GO_VERSION: "1.25"
  # China Go proxy for faster module downloads (injected into Dockerfile via --build-arg)
  GOPROXY: "https://goproxy.cn,https://goproxy.io,direct"
  # China NPM registry (injected into Dockerfile via --build-arg)
  NPM_REGISTRY: "https://repo.huaweicloud.com/repository/npm/"
  # Registry prefix for Dockerfile base images (internal mirror avoids Docker Hub timeouts)
  REGISTRY_PREFIX: "${REGISTRY}/library/"

stages:
  - test
  - build
  - package
  - release
  - deploy

# =============================================================================
# Test Stage - Run on MR pipelines
# =============================================================================

# Test backend (Go)
test-backend:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  services:
    - name: ${REGISTRY}/library/postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test
        POSTGRES_DB: agentsmesh_test
    - name: ${REGISTRY}/library/redis:7-alpine
      alias: redis
  variables:
    DATABASE_URL: "postgres://test:test@postgres:5432/agentsmesh_test?sslmode=disable"
    REDIS_URL: "redis://redis:6379"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd backend
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.out
      - backend/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test web (Next.js/Vitest)
test-web:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd clients/web
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm test:run --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: clients/web/report.xml
      coverage_report:
        coverage_format: cobertura
        path: clients/web/coverage/cobertura-coverage.xml
    paths:
      - clients/web/coverage/
      - clients/web/report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test web-admin (Next.js)
test-web-admin:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/node:20-alpine
  before_script:
    - corepack enable
  script:
    - cd clients/web-admin
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web-admin/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test runner (Go)
test-runner:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd runner
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: runner/report.xml
      coverage_report:
        coverage_format: cobertura
        path: runner/coverage.xml
    paths:
      - runner/coverage.out
      - runner/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# Test relay (Go)
test-relay:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/golang:${GO_VERSION}
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - cd relay
    - gotestsum --junitfile report.xml -- -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out
    - gocover-cobertura < coverage.out > coverage.xml
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      junit: relay/report.xml
      coverage_report:
        coverage_format: cobertura
        path: relay/coverage.xml
    paths:
      - relay/coverage.out
      - relay/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - relay/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Build Verification - Run on MR pipelines (no push)
# =============================================================================
# These jobs verify that the code compiles successfully without pushing images.
# This catches build errors before merging to main.

# Verify backend build (MR only)
verify-build-backend:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg GO_VERSION=${GO_VERSION} --build-arg GOPROXY=${GOPROXY} -f ci/backend.Dockerfile -t backend-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile

# Verify web build (MR only)
verify-build-web:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd clients/web
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} -f ../../ci/web.Dockerfile -t web-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web/**/*
        - ci/web.Dockerfile

# Verify web-admin build (MR only)
verify-build-web-admin:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd clients/web-admin
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg NPM_REGISTRY=${NPM_REGISTRY} -f ../../ci/web-admin.Dockerfile -t web-admin-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web-admin/**/*
        - ci/web-admin.Dockerfile

# Verify runner build (MR only)
verify-build-runner:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg GO_VERSION=${GO_VERSION} --build-arg GOPROXY=${GOPROXY} -f ci/runner.Dockerfile -t runner-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
        - proto/**/*
        - ci/runner.Dockerfile

# Verify relay build (MR only)
verify-build-relay:
  stage: test
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg GO_VERSION=${GO_VERSION} --build-arg GOPROXY=${GOPROXY} -f ci/relay.Dockerfile -t relay-verify:${CI_COMMIT_SHORT_SHA} .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - relay/**/*
        - ci/relay.Dockerfile

# =============================================================================
# Build Stage - Run on main branch (push to registry)
# =============================================================================

# Build backend image
build-backend:
  stage: build
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg GO_VERSION=${GO_VERSION} --build-arg GOPROXY=${GOPROXY} -f ci/backend.Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${BACKEND_IMAGE}:latest .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - ci/backend.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

# Build web image
build-web:
  stage: build
  tags:
    - x86
    - docker
  image: ${REGISTRY}/library/docker:latest
  services:
    - name: ${REGISTRY}/library/docker:dind
      alias: docker
  script:
    - cd clients/web
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} -f ../../ci/web.Dockerfile -t ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WEB_IMAGE}:latest .
    - docker push ${WEB_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WEB_IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web/**/*
        - ci/web.Dockerfile
    - if: $CI_PIPELINE_SOURCE == "web"

