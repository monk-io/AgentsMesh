        - relay/**/*
    - if: $CI_PIPELINE_SOURCE == "web"

# =============================================================================
# Build Verification — Run on MR pipelines (build only, no push)
# =============================================================================
# `bazel build //<target>:image` catches compile errors + OCI layering
# problems before merge, without touching the registry.

verify-build-backend:
  <<: *bazel-defaults
  stage: test
  script:
    - bazel build //backend/cmd/server:image
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
        - proto/**/*
        - build_defs/**/*
        - MODULE.bazel
        - .bazelrc

verify-build-web:
  <<: *bazel-defaults
  stage: test
  script:
    - bazel build //clients/web:image
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web/**/*
        - build_defs/**/*
        - MODULE.bazel
        - .bazelrc

verify-build-web-admin:
  <<: *bazel-defaults
  stage: test
  script:
    - bazel build //clients/web-admin:image
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - clients/web-admin/**/*
        - build_defs/**/*
        - MODULE.bazel
        - .bazelrc

verify-build-runner:
  <<: *bazel-defaults
  stage: test
  script:
    - bazel build //runner/cmd/runner:image
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runner/**/*
        - proto/**/*
        - build_defs/**/*
        - MODULE.bazel
        - .bazelrc

verify-build-relay:
  <<: *bazel-defaults
  stage: test
  script:
    - bazel build //relay/cmd/relay:image
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - relay/**/*
        - build_defs/**/*
        - MODULE.bazel
        - .bazelrc

# =============================================================================
# Build Stage — Run on main branch (build + push to corp registry)
# =============================================================================
# `bazel run //<target>:image_push_corp` publishes tags `latest`,
# `${IMAGE_VERSION}`, `${IMAGE_MINOR}` as stamped by
# build_defs/workspace_status.sh.

build-backend:
  <<: *bazel-push
  stage: build
  variables:
    IMAGE_VERSION: sha-${CI_COMMIT_SHORT_SHA}
    IMAGE_MINOR: latest
  script:
    - >-
      bazel run --stamp
      --workspace_status_command=build_defs/workspace_status.sh
      //backend/cmd/server:image_push_corp
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - proto/**/*
        - build_defs/**/*
        - MODULE.bazel
    - if: $CI_PIPELINE_SOURCE == "web"

build-web:
  <<: *bazel-push
  stage: build
  variables:
    IMAGE_VERSION: sha-${CI_COMMIT_SHORT_SHA}
    IMAGE_MINOR: latest
  script:
    - >-
      bazel run --stamp
      --workspace_status_command=build_defs/workspace_status.sh
      //clients/web:image_push_corp
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web/**/*
        - build_defs/**/*
        - MODULE.bazel
    - if: $CI_PIPELINE_SOURCE == "web"

build-web-admin:
  <<: *bazel-push
  stage: build
  variables:
    IMAGE_VERSION: sha-${CI_COMMIT_SHORT_SHA}
