  script:
    # Build from project root to include proto/ directory
    - docker build --build-arg REGISTRY_PREFIX=${REGISTRY_PREFIX} --build-arg GO_VERSION=${GO_VERSION} --build-arg GOPROXY=${GOPROXY} -f ci/runner.Dockerfile -t ${RUNNER_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${RUNNER_IMAGE}:latest .
