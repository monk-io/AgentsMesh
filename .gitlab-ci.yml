  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - clients/web-admin/**/*
        - build_defs/**/*
        - MODULE.bazel
    - if: $CI_PIPELINE_SOURCE == "web"

build-runner:
  <<: *bazel-push
  stage: build
  variables:
    IMAGE_VERSION: sha-${CI_COMMIT_SHORT_SHA}
    IMAGE_MINOR: latest
  script:
    - >-
      bazel run --stamp
      --workspace_status_command=build_defs/workspace_status.sh
      //runner/cmd/runner:image_push_corp
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runner/**/*
        - proto/**/*
        - build_defs/**/*
        - MODULE.bazel
    - if: $CI_PIPELINE_SOURCE == "web"

build-relay:
  <<: *bazel-push
  stage: build
  variables:
    IMAGE_VERSION: sha-${CI_COMMIT_SHORT_SHA}
    IMAGE_MINOR: latest
  script:
    - >-
      bazel run --stamp
      --workspace_status_command=build_defs/workspace_status.sh
