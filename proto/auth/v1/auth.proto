// AuthService — user-scoped authentication entry points.
//
// Migrated from REST handlers in
//   backend/internal/api/rest/v1/auth.go
//   backend/internal/api/rest/v1/auth_login.go
//   backend/internal/api/rest/v1/auth_verification.go
//   backend/internal/api/rest/v1/auth_oauth.go
// per .claude/plans/proto-naming-conventions.md. Conventions enforced:
//   * package proto.auth.v1 + go_package suffix for dispatch
//   * service name = <Domain>Service, methods PascalCase verbs
//   * snake_case fields, no json_name annotations
//   * USER-SCOPED service: no org_slug = 1 (conventions §3.5 exception #1)
//     — login/register/refresh/oauth_callback are public (unauthenticated)
//     entry points; password-reset and email-verification are also user-scoped
//   * timestamps as string ISO-8601 (no google.protobuf.Timestamp)
//   * create/update return entity directly (no {entity:...} wrapper) —
//     except where the response carries multiple top-level fields (tokens
//     + user + message), which then use a dedicated <Method>Response.
//
// SENSITIVE DATA: password, refresh_token, access_token round-trip on the
// wire. The proto messages here describe ONLY the response shape; passwords
// are write-only (request fields) and never appear on response messages.
//
// Public (unauthenticated) RPCs — auth interceptor MUST NOT be applied:
//   Login, Register, RefreshToken, OAuthCallback, OAuthRedirect,
//   ForgotPassword, ResetPassword, VerifyEmail, ResendVerification.
// All AuthService RPCs are public — the act of authenticating must happen
// before a token exists. Logout is the only authenticated RPC (it revokes
// the caller's token) and lives on AuthSessionService.

syntax = "proto3";

package proto.auth.v1;

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/auth/v1;authv1";

// ============================================================================
// AuthService — public (unauthenticated) RPCs
// ============================================================================
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Password reset (no auth — driven by email-delivered token).
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // Email verification (no auth — driven by email-delivered token).
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);

  // OAuth provider flow. OAuthRedirect produces the redirect URL the
  // browser must navigate to (server-side state generation cannot happen
  // client-side). OAuthCallback exchanges the provider's `code` for tokens.
  rpc OAuthRedirect(OAuthRedirectRequest) returns (OAuthRedirectResponse);
  rpc OAuthCallback(OAuthCallbackRequest) returns (OAuthCallbackResponse);
}

// ============================================================================
// AuthSessionService — authenticated session management
// ============================================================================
// Logout is the only authenticated AuthService RPC — needs the caller's
// bearer token to revoke. Lives on its own service so the public AuthService
// can be mounted without the auth interceptor while AuthSessionService keeps
// it.
service AuthSessionService {
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// User mirrors the user gin.H block emitted by Login / Register / VerifyEmail
// REST handlers. `is_email_verified` is set for Register / VerifyEmail
// responses; Login currently omits it from REST (legacy) but the field is
// always available server-side, so we surface it here for consistency.
message User {
  int64 id = 1;
  string email = 2;
  string username = 3;
  optional string name = 4;
  optional string avatar_url = 5;
  optional bool is_email_verified = 6;
}

// ---- Login ----

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
}

// ---- Register ----

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
  // Optional display name; defaults to username server-side.
  optional string name = 4;
}

message RegisterResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
  // Optional banner message — REST emits "Please verify your email" etc.
  optional string message = 5;
}

// ---- Refresh ----

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

// ---- Logout ----

// LogoutRequest is empty — server revokes the bearer token from the
// Authorization header. Connect-RPC requires a request message even for
// no-arg RPCs (no nullary support).
message LogoutRequest {}

message LogoutResponse {
  string message = 1;
}

// ---- Email verification ----

message VerifyEmailRequest {
  string token = 1;
}

message VerifyEmailResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
  string message = 5;
}

message ResendVerificationRequest {
  string email = 1;
}

message ResendVerificationResponse {
  string message = 1;
}

// ---- Password reset ----

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  string message = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

// ---- OAuth ----

message OAuthRedirectRequest {
  // OAuth provider slug — github / google / gitlab / gitee.
  string provider = 1;
  // Where to send the user after the provider callback succeeds. Empty
  // string → server-side default (PrimaryDomain root).
  optional string redirect = 2;
}

message OAuthRedirectResponse {
  // Fully-formed provider authorization URL. The browser navigates here.
  string auth_url = 1;
}

message OAuthCallbackRequest {
  string provider = 1;
  string code = 2;
  string state = 3;
}

message OAuthCallbackResponse {
  string token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  User user = 4;
  // Frontend redirect URL the original AuthRedirect request requested
  // (relayed back so the SPA can finish the navigation).
  string redirect = 5;
}
