// proto.acp_state.v1 — client-side ACP session-state mutation contract.
//
// ACP (Agent Control Protocol) carries deeply nested, fast-evolving payloads
// (tool calls / plan steps / permission requests / configuration) sourced
// from the agent protocol wire. The UI owns those schemas — Rust state
// stores them opaquely and never interprets them. Mirrors the
// ChannelMessage.content_json design.
//
// Each mutation message carries a JSON blob string; renderer encodes via
// JSON.stringify, Rust state decodes via serde_json before storing.

syntax = "proto3";

package proto.acp_state.v1;

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/acp_state/v1;acpstatev1";

// Realtime tool_call_update event — wire payload is opaque AST.
message UpdateToolCallRequest {
  string pod_key = 1;
  string tool_call_json = 2;
}

// Realtime plan_update event — array of plan steps, opaque AST.
message UpdatePlanRequest {
  string pod_key = 1;
  string steps_json = 2;
}

// Realtime permission_request event — opaque request AST.
message AddPermissionRequestRequest {
  string pod_key = 1;
  string request_json = 2;
}

// Configuration mutation (model / permission mode etc.) — opaque AST.
message UpdateConfigurationRequest {
  string pod_key = 1;
  string config_json = 2;
}
