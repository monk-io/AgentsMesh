  optional string search = 1;
  optional bool is_active = 2;
  optional bool is_admin = 3;
  optional int32 page = 4;
  optional int32 page_size = 5;
}

message ListUsersResponse {
  repeated AdminUser items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetUserRequest {
  int64 user_id = 1;
}

message UpdateUserRequest {
  int64 user_id = 1;
  optional string name = 2;
  optional string username = 3;
  optional string email = 4;
}

message DisableUserRequest {
  int64 user_id = 1;
}

message EnableUserRequest {
  int64 user_id = 1;
}

message GrantAdminRequest {
  int64 user_id = 1;
}

message RevokeAdminRequest {
  int64 user_id = 1;
}

message VerifyUserEmailRequest {
  int64 user_id = 1;
}

message UnverifyUserEmailRequest {
  int64 user_id = 1;
}

// --- Organizations ---

message ListOrganizationsRequest {
  optional string search = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message ListOrganizationsResponse {
  repeated AdminOrganization items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetOrganizationRequest {
  int64 org_id = 1;
}

message GetOrganizationMembersRequest {
