// AdminService — platform-admin (`is_system_admin=true`) management plane.
//
// Migrated from REST handlers in backend/internal/api/rest/v1/admin/* per
// .claude/plans/proto-naming-conventions.md. Covers the batch-1 surface:
//   * Dashboard           — system stats
//   * Users               — list/get/update/disable/enable/grant/revoke admin
//                           + verify/unverify email
//   * Organizations       — list/get/members/delete
//   * Runners             — list/get/disable/enable/delete (across all orgs)
//   * AuditLogs           — list with filters
//   * Relays              — list/get/stats/force-unregister
//   * SupportTickets      — list/get/stats/list-messages/status/assign/attachment-url
//                           (Reply with multipart attachments stays on REST)
//
// AdminAuthService — admin-console login flow.
//
// Mirrors backend/internal/api/rest/v1/admin/auth.go. The login RPC is
// PUBLIC (no auth interceptor) because the caller does not yet hold a
// bearer; the handler enforces is_system_admin + is_active server-side.
// GetMe lives on AdminAuthSessionService (auth-required).
//
// Auth model (conventions §3.5 EXCEPTION — platform-admin scoped):
//   Every RPC requires (1) a valid bearer JWT (standard auth interceptor)
//   AND (2) the calling user's `is_system_admin = true` AND `is_active =
//   true` flags. The Connect admin interceptor combines REST's
//   `AuthMiddleware` + `AdminMiddleware` (backend/internal/middleware/admin.go)
//   into a single pipeline step. Per conventions §3.5 exception #2, admin
//   request messages do NOT carry `org_slug` at tag 1; tenant is the whole
//   platform and is implied by the admin interceptor.
//
// Audit-log shape:
//   REST handlers call `LogAdminAction` from a `gin.Context` to read the
//   admin user ID + IP + user-agent. The Connect handler reads:
//     * admin user ID  — from the auth interceptor's TenantContext
//     * IP address     — from req.Peer().Addr (Connect's transport hook)
//     * user-agent     — from req.Header().Get("User-Agent")
//   so audit logging is parity-preserving across both transports.

syntax = "proto3";

package proto.admin.v1;

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/admin/v1;adminv1";

service AdminService {
  // Dashboard
  rpc GetDashboardStats(GetDashboardStatsRequest) returns (DashboardStats);

  // Users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (AdminUser);
  rpc UpdateUser(UpdateUserRequest) returns (AdminUser);
  rpc DisableUser(DisableUserRequest) returns (AdminUser);
  rpc EnableUser(EnableUserRequest) returns (AdminUser);
  rpc GrantAdmin(GrantAdminRequest) returns (AdminUser);
  rpc RevokeAdmin(RevokeAdminRequest) returns (AdminUser);
  rpc VerifyUserEmail(VerifyUserEmailRequest) returns (AdminUser);
  rpc UnverifyUserEmail(UnverifyUserEmailRequest) returns (AdminUser);

  // Organizations
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (AdminOrganization);
  rpc GetOrganizationMembers(GetOrganizationMembersRequest) returns (GetOrganizationMembersResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);

  // Runners
  rpc ListRunners(ListRunnersRequest) returns (ListRunnersResponse);
  rpc GetRunner(GetRunnerRequest) returns (AdminRunner);
  rpc DisableRunner(DisableRunnerRequest) returns (AdminRunner);
  rpc EnableRunner(EnableRunnerRequest) returns (AdminRunner);
  rpc DeleteRunner(DeleteRunnerRequest) returns (DeleteRunnerResponse);

  // Audit logs
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);

  // Relays (data-plane WS hubs). Mirrors REST /api/v1/admin/relays.
  // The relay manager keeps an in-memory roster + Redis-mirrored heartbeat;
  // these RPCs only read from / unregister against that roster (no DB).
  rpc ListRelays(ListRelaysRequest) returns (ListRelaysResponse);
  rpc GetRelay(GetRelayRequest) returns (GetRelayResponse);
  rpc GetRelayStats(GetRelayStatsRequest) returns (RelayStats);
  rpc ForceUnregisterRelay(ForceUnregisterRelayRequest) returns (ForceUnregisterRelayResponse);

  // Support tickets. Mirrors REST /api/v1/admin/support-tickets except for
  // POST /:id/reply — that path keeps multipart/form-data on REST because
  // Connect-RPC has no multipart story (parity with the user-side service).
  rpc ListSupportTickets(ListSupportTicketsRequest) returns (ListSupportTicketsResponse);
  rpc GetSupportTicketStats(GetSupportTicketStatsRequest) returns (SupportTicketStats);
  rpc GetSupportTicket(GetSupportTicketRequest) returns (SupportTicketDetail);
  rpc ListSupportTicketMessages(ListSupportTicketMessagesRequest) returns (ListSupportTicketMessagesResponse);
  rpc UpdateSupportTicketStatus(UpdateSupportTicketStatusRequest) returns (UpdateSupportTicketStatusResponse);
  rpc AssignSupportTicket(AssignSupportTicketRequest) returns (AssignSupportTicketResponse);
  rpc GetSupportTicketAttachmentUrl(GetSupportTicketAttachmentUrlRequest) returns (GetSupportTicketAttachmentUrlResponse);
}

// AdminAuthService — admin-console login flow. Public (no auth interceptor)
// — the caller does not yet have a bearer when hitting Login. The handler
// enforces `is_system_admin = true` + `is_active = true` before issuing a
// JWT so non-admin accounts can never receive an admin-scoped token.
service AdminAuthService {
  rpc Login(AdminLoginRequest) returns (AdminLoginResponse);
}

// AdminAuthSessionService — authenticated admin session lookups. Mirrors
// REST GET /api/v1/admin/me. Lives on its own service so AdminAuthService
// stays free of the auth interceptor.
service AdminAuthSessionService {
  rpc GetMe(GetMeRequest) returns (AdminUser);
}

// --- Dashboard ---

message GetDashboardStatsRequest {}

message DashboardStats {
  int64 total_users = 1;
  int64 active_users = 2;
  int64 total_organizations = 3;
  int64 total_runners = 4;
  int64 online_runners = 5;
  int64 total_pods = 6;
  int64 active_pods = 7;
  int64 total_subscriptions = 8;
  int64 active_subscriptions = 9;
  int64 new_users_today = 10;
  int64 new_users_this_week = 11;
  int64 new_users_this_month = 12;
}

// --- Common nested types ---

message AdminUser {
  int64 id = 1;
  string email = 2;
  string username = 3;
  optional string name = 4;
  optional string avatar_url = 5;
  bool is_active = 6;
  bool is_system_admin = 7;
  bool is_email_verified = 8;
  // RFC 3339 timestamps; nullable last_login_at omitted when never logged in.
  optional string last_login_at = 9;
  string created_at = 10;
  string updated_at = 11;
}

message AdminOrganization {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  optional string logo_url = 4;
  string subscription_plan = 5;
  string subscription_status = 6;
  string created_at = 7;
  string updated_at = 8;
}

// AdminOrganizationMember mirrors the REST `memberResponse` shape (nested
// user identity, role, joined_at). The embedded user is optional because
// `Preload("User")` may fail to load for orphaned memberships.
message AdminOrganizationMember {
  int64 id = 1;
  int64 user_id = 2;
  int64 org_id = 3;
  string role = 4;
  string joined_at = 5;
  optional AdminUserSummary user = 6;
}

message AdminUserSummary {
  int64 id = 1;
  string email = 2;
  string username = 3;
  optional string name = 4;
  optional string avatar_url = 5;
}

message AdminRunner {
  int64 id = 1;
  int64 organization_id = 2;
  string node_id = 3;
  optional string description = 4;
  string status = 5;
  bool is_enabled = 6;
  optional string runner_version = 7;
  int32 current_pods = 8;
  int32 max_concurrent_pods = 9;
  repeated string available_agents = 10;
  // Free-form host metadata; JSON-serialized for binary parity with REST.
  optional string host_info_json = 11;
  optional string last_heartbeat = 12;
  string created_at = 13;
  string updated_at = 14;
  // Optional embedded org summary (parity with runnerResponseWithOrg).
  optional AdminOrganizationSummary organization = 15;
}

message AdminOrganizationSummary {
  int64 id = 1;
  string name = 2;
  string slug = 3;
}

message AdminAuditLog {
  int64 id = 1;
  int64 admin_user_id = 2;
  string action = 3;
  string target_type = 4;
  int64 target_id = 5;
  optional string old_data = 6;
  optional string new_data = 7;
  optional string ip_address = 8;
  optional string user_agent = 9;
  string created_at = 10;
  optional AdminUserSummary admin_user = 11;
}

// --- Users ---

message ListUsersRequest {
  optional string search = 1;
  optional bool is_active = 2;
  optional bool is_admin = 3;
  optional int32 page = 4;
  optional int32 page_size = 5;
}

message ListUsersResponse {
  repeated AdminUser items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetUserRequest {
  int64 user_id = 1;
}

message UpdateUserRequest {
  int64 user_id = 1;
  optional string name = 2;
  optional string username = 3;
  optional string email = 4;
}

message DisableUserRequest {
  int64 user_id = 1;
}

message EnableUserRequest {
  int64 user_id = 1;
}

message GrantAdminRequest {
  int64 user_id = 1;
}

message RevokeAdminRequest {
  int64 user_id = 1;
}

message VerifyUserEmailRequest {
  int64 user_id = 1;
}

message UnverifyUserEmailRequest {
  int64 user_id = 1;
}

// --- Organizations ---

message ListOrganizationsRequest {
  optional string search = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message ListOrganizationsResponse {
  repeated AdminOrganization items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetOrganizationRequest {
  int64 org_id = 1;
}

message GetOrganizationMembersRequest {
  int64 org_id = 1;
}

message GetOrganizationMembersResponse {
  AdminOrganization organization = 1;
  repeated AdminOrganizationMember members = 2;
}

message DeleteOrganizationRequest {
  int64 org_id = 1;
}

message DeleteOrganizationResponse {
  string message = 1;
}

// --- Runners ---

message ListRunnersRequest {
  optional string search = 1;
  optional string status = 2;
  optional int64 org_id = 3;
  optional int32 page = 4;
  optional int32 page_size = 5;
}

message ListRunnersResponse {
  repeated AdminRunner items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetRunnerRequest {
  int64 runner_id = 1;
}

message DisableRunnerRequest {
  int64 runner_id = 1;
}

message EnableRunnerRequest {
  int64 runner_id = 1;
}

message DeleteRunnerRequest {
  int64 runner_id = 1;
}

message DeleteRunnerResponse {
  string message = 1;
}

// --- Audit logs ---

message ListAuditLogsRequest {
  optional int64 admin_user_id = 1;
  optional string action = 2;
  optional string target_type = 3;
  optional int64 target_id = 4;
  // RFC 3339 timestamps; empty string = no bound.
  optional string start_time = 5;
  optional string end_time = 6;
  optional int32 page = 7;
  optional int32 page_size = 8;
}

message ListAuditLogsResponse {
  repeated AdminAuditLog items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// --- Relays ---

// AdminRelay mirrors backend/internal/service/relay/RelayInfo. Field shape is
// REST parity (`relay_info.go:11`) — JSON struct tags match the wire names.
message AdminRelay {
  string id = 1;
  string url = 2;
  string region = 3;
  int32 capacity = 4;
  int32 connections = 5;
  double cpu_usage = 6;
  double memory_usage = 7;
  // RFC 3339 timestamp.
  string last_heartbeat = 8;
  bool healthy = 9;
  int32 avg_latency_ms = 10;
  double latitude = 11;
  double longitude = 12;
}

message RelayStats {
  int32 total_relays = 1;
  int32 healthy_relays = 2;
  int32 total_connections = 3;
}

message ListRelaysRequest {}

message ListRelaysResponse {
  repeated AdminRelay items = 1;
  int32 total = 2;
}

message GetRelayRequest {
  string id = 1;
}

message GetRelayResponse {
  AdminRelay relay = 1;
}

message GetRelayStatsRequest {}

message ForceUnregisterRelayRequest {
  string id = 1;
}

message ForceUnregisterRelayResponse {
  string status = 1;
  string relay_id = 2;
}

// --- Support tickets ---

message AdminSupportTicketUser {
  int64 id = 1;
  optional string name = 2;
  string email = 3;
  optional string avatar_url = 4;
}

message AdminSupportTicket {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string category = 4;
  string status = 5;
  string priority = 6;
  optional int64 assigned_admin_id = 7;
  string created_at = 8;
  string updated_at = 9;
  optional string resolved_at = 10;
  optional AdminSupportTicketUser user = 11;
  optional AdminSupportTicketUser assigned_admin = 12;
}

message AdminSupportTicketAttachment {
  int64 id = 1;
  int64 ticket_id = 2;
  optional int64 message_id = 3;
  int64 uploader_id = 4;
  string original_name = 5;
  string mime_type = 6;
  int64 size = 7;
  string created_at = 8;
}

message AdminSupportTicketMessage {
  int64 id = 1;
  int64 ticket_id = 2;
  int64 user_id = 3;
  string content = 4;
  bool is_admin_reply = 5;
  string created_at = 6;
  optional AdminSupportTicketUser user = 7;
  repeated AdminSupportTicketAttachment attachments = 8;
}

message SupportTicketStats {
  int64 total = 1;
  int64 open = 2;
  int64 in_progress = 3;
  int64 resolved = 4;
  int64 closed = 5;
}

message ListSupportTicketsRequest {
  optional string search = 1;
  optional string status = 2;
  optional string category = 3;
  optional string priority = 4;
  optional int32 page = 5;
  optional int32 page_size = 6;
}

message ListSupportTicketsResponse {
  repeated AdminSupportTicket items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetSupportTicketStatsRequest {}

message GetSupportTicketRequest {
  int64 id = 1;
}

// SupportTicketDetail mirrors REST `{ticket, messages}` shape — same as
// the user-side SupportTicketDetail but on the admin envelope so the
// embedded user identity is the renderer-facing variant.
message SupportTicketDetail {
  AdminSupportTicket ticket = 1;
  repeated AdminSupportTicketMessage messages = 2;
}

message ListSupportTicketMessagesRequest {
  int64 id = 1;
}

message ListSupportTicketMessagesResponse {
  repeated AdminSupportTicketMessage data = 1;
}

message UpdateSupportTicketStatusRequest {
  int64 id = 1;
  string status = 2;
}

message UpdateSupportTicketStatusResponse {
  string message = 1;
}

message AssignSupportTicketRequest {
  int64 id = 1;
  // When unset, the handler assigns the calling admin to the ticket
  // (mirrors REST behavior at support_ticket_actions.go:155).
  optional int64 admin_id = 2;
}

message AssignSupportTicketResponse {
  string message = 1;
}

message GetSupportTicketAttachmentUrlRequest {
  int64 attachment_id = 1;
}

message GetSupportTicketAttachmentUrlResponse {
  string url = 1;
}

// --- Admin auth ---

message AdminLoginRequest {
  string email = 1;
  string password = 2;
}

message AdminLoginResponse {
  string token = 1;
  string refresh_token = 2;
  AdminUser user = 3;
}

message GetMeRequest {}
