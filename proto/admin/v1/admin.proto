// AdminService — platform-admin (`is_system_admin=true`) management plane.
//
// Migrated from REST handlers in backend/internal/api/rest/v1/admin/* per
// .claude/plans/proto-naming-conventions.md. Covers the batch-1 surface:
//   * Dashboard           — system stats
//   * Users               — list/get/update/disable/enable/grant/revoke admin
//                           + verify/unverify email
//   * Organizations       — list/get/members/delete
//   * Runners             — list/get/disable/enable/delete (across all orgs)
//   * AuditLogs           — list with filters
//   * Relays              — list/get/stats/force-unregister
//   * SupportTickets      — list/get/stats/list-messages/status/assign/attachment-url
//                           (Reply with multipart attachments stays on REST)
//
// AdminAuthService — admin-console login flow.
//
// Mirrors backend/internal/api/rest/v1/admin/auth.go. The login RPC is
// PUBLIC (no auth interceptor) because the caller does not yet hold a
// bearer; the handler enforces is_system_admin + is_active server-side.
// GetMe lives on AdminAuthSessionService (auth-required).
//
// Auth model (conventions §3.5 EXCEPTION — platform-admin scoped):
//   Every RPC requires (1) a valid bearer JWT (standard auth interceptor)
//   AND (2) the calling user's `is_system_admin = true` AND `is_active =
//   true` flags. The Connect admin interceptor combines REST's
//   `AuthMiddleware` + `AdminMiddleware` (backend/internal/middleware/admin.go)
//   into a single pipeline step. Per conventions §3.5 exception #2, admin
//   request messages do NOT carry `org_slug` at tag 1; tenant is the whole
//   platform and is implied by the admin interceptor.
//
// Audit-log shape:
//   REST handlers call `LogAdminAction` from a `gin.Context` to read the
//   admin user ID + IP + user-agent. The Connect handler reads:
//     * admin user ID  — from the auth interceptor's TenantContext
//     * IP address     — from req.Peer().Addr (Connect's transport hook)
//     * user-agent     — from req.Header().Get("User-Agent")
//   so audit logging is parity-preserving across both transports.

syntax = "proto3";

package proto.admin.v1;

import "codegen/v1/options.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/admin/v1;adminv1";

// Convert codegen target — emits admin_convert.amesh.go into the backend
// connect handler tree so it can reach the admin / organization / user /
// relay domains.
option (amesh.codegen.v1.convert_target) = {
  output_dir: "backend/internal/api/connect/admin"
  output_package: "adminconnect"
};

service AdminService {
  // Dashboard
  rpc GetDashboardStats(GetDashboardStatsRequest) returns (DashboardStats);

  // Users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (AdminUser);
  rpc UpdateUser(UpdateUserRequest) returns (AdminUser);
  rpc DisableUser(DisableUserRequest) returns (AdminUser);
  rpc EnableUser(EnableUserRequest) returns (AdminUser);
  rpc GrantAdmin(GrantAdminRequest) returns (AdminUser);
  rpc RevokeAdmin(RevokeAdminRequest) returns (AdminUser);
  rpc VerifyUserEmail(VerifyUserEmailRequest) returns (AdminUser);
  rpc UnverifyUserEmail(UnverifyUserEmailRequest) returns (AdminUser);

  // Organizations
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc GetOrganization(GetOrganizationRequest) returns (AdminOrganization);
  rpc GetOrganizationMembers(GetOrganizationMembersRequest) returns (GetOrganizationMembersResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);

  // Runners
  rpc ListRunners(ListRunnersRequest) returns (ListRunnersResponse);
  rpc GetRunner(GetRunnerRequest) returns (AdminRunner);
  rpc DisableRunner(DisableRunnerRequest) returns (AdminRunner);
  rpc EnableRunner(EnableRunnerRequest) returns (AdminRunner);
  rpc DeleteRunner(DeleteRunnerRequest) returns (DeleteRunnerResponse);

  // Audit logs
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);

  // Relays (data-plane WS hubs). Mirrors REST /api/v1/admin/relays.
  // The relay manager keeps an in-memory roster + Redis-mirrored heartbeat;
  // these RPCs only read from / unregister against that roster (no DB).
  rpc ListRelays(ListRelaysRequest) returns (ListRelaysResponse);
  rpc GetRelay(GetRelayRequest) returns (GetRelayResponse);
  rpc GetRelayStats(GetRelayStatsRequest) returns (RelayStats);
  rpc ForceUnregisterRelay(ForceUnregisterRelayRequest) returns (ForceUnregisterRelayResponse);

  // Support tickets. Mirrors REST /api/v1/admin/support-tickets except for
  // POST /:id/reply — that path keeps multipart/form-data on REST because
  // Connect-RPC has no multipart story (parity with the user-side service).
  rpc ListSupportTickets(ListSupportTicketsRequest) returns (ListSupportTicketsResponse);
  rpc GetSupportTicketStats(GetSupportTicketStatsRequest) returns (SupportTicketStats);
  rpc GetSupportTicket(GetSupportTicketRequest) returns (SupportTicketDetail);
  rpc ListSupportTicketMessages(ListSupportTicketMessagesRequest) returns (ListSupportTicketMessagesResponse);
  rpc UpdateSupportTicketStatus(UpdateSupportTicketStatusRequest) returns (UpdateSupportTicketStatusResponse);
  rpc AssignSupportTicket(AssignSupportTicketRequest) returns (AssignSupportTicketResponse);
  rpc GetSupportTicketAttachmentUrl(GetSupportTicketAttachmentUrlRequest) returns (GetSupportTicketAttachmentUrlResponse);

  // Dead-letter queue. Mirrors REST /api/v1/orgs/:slug/messages/dlq (the
  // org_slug in the REST path was vestigial — the DLQ is platform-scoped
  // ops surface, no tenant filtering). Connect drops the slug entirely.
  rpc ListDeadLetters(ListDeadLettersRequest) returns (ListDeadLettersResponse);
  rpc ReplayDeadLetter(ReplayDeadLetterRequest) returns (ReplayDeadLetterResponse);
}

// AdminAuthService — admin-console login flow. Public (no auth interceptor)
// — the caller does not yet have a bearer when hitting Login. The handler
// enforces `is_system_admin = true` + `is_active = true` before issuing a
// JWT so non-admin accounts can never receive an admin-scoped token.
service AdminAuthService {
  rpc Login(AdminLoginRequest) returns (AdminLoginResponse);
}

// AdminAuthSessionService — authenticated admin session lookups. Mirrors
// REST GET /api/v1/admin/me. Lives on its own service so AdminAuthService
// stays free of the auth interceptor.
service AdminAuthSessionService {
  rpc GetMe(GetMeRequest) returns (AdminUser);
}

// --- Dashboard ---

message GetDashboardStatsRequest {}

message DashboardStats {
  int64 total_users = 1;
  int64 active_users = 2;
  int64 total_organizations = 3;
  int64 total_runners = 4;
  int64 online_runners = 5;
  int64 total_pods = 6;
  int64 active_pods = 7;
  int64 total_subscriptions = 8;
  int64 active_subscriptions = 9;
  int64 new_users_today = 10;
  int64 new_users_this_week = 11;
  int64 new_users_this_month = 12;
}

// --- Common nested types ---

message AdminUser {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/user.User"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string email = 2;
  string username = 3;
  optional string name = 4 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string avatar_url = 5 [
    (amesh.codegen.v1.field_rename) = "AvatarURL",
    (amesh.codegen.v1.field_convert) = "string_ptr"
  ];
  bool is_active = 6;
  bool is_system_admin = 7;
  bool is_email_verified = 8;
  // RFC 3339 timestamps; nullable last_login_at omitted when never logged in.
  optional string last_login_at = 9 [(amesh.codegen.v1.field_convert) = "rfc3339_ptr"];
  string created_at = 10 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  string updated_at = 11 [(amesh.codegen.v1.field_convert) = "rfc3339"];
}

message AdminOrganization {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/organization.Organization"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string name = 2;
  string slug = 3;
  optional string logo_url = 4 [
    (amesh.codegen.v1.field_rename) = "LogoURL",
    (amesh.codegen.v1.field_convert) = "string_ptr"
  ];
  string subscription_plan = 5;
  string subscription_status = 6;
  string created_at = 7 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  string updated_at = 8 [(amesh.codegen.v1.field_convert) = "rfc3339"];
}

// AdminOrganizationMember mirrors the REST `memberResponse` shape (nested
// user identity, role, joined_at). The embedded user is optional because
// `Preload("User")` may fail to load for orphaned memberships.
message AdminOrganizationMember {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/organization.Member"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  int64 user_id = 2 [(amesh.codegen.v1.field_rename) = "UserID"];
  int64 org_id = 3 [(amesh.codegen.v1.field_rename) = "OrganizationID"];
  string role = 4;
  string joined_at = 5 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  optional AdminUserSummary user = 6 [(amesh.codegen.v1.field_custom) = "userSummaryToProto"];
}

message AdminUserSummary {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/user.User"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string email = 2;
  string username = 3;
  optional string name = 4 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string avatar_url = 5 [
    (amesh.codegen.v1.field_rename) = "AvatarURL",
    (amesh.codegen.v1.field_convert) = "string_ptr"
  ];
}

message AdminRunner {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/runner.Runner"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  int64 organization_id = 2 [(amesh.codegen.v1.field_rename) = "OrganizationID"];
  string node_id = 3 [(amesh.codegen.v1.field_rename) = "NodeID"];
  // domain Description is plain string (zero = absent); proto is optional.
  optional string description = 4 [(amesh.codegen.v1.field_custom) = "adminDescriptionToProto"];
  string status = 5;
  bool is_enabled = 6;
  optional string runner_version = 7 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  int32 current_pods = 8 [(amesh.codegen.v1.field_convert) = "int_to_int32"];
  int32 max_concurrent_pods = 9 [(amesh.codegen.v1.field_convert) = "int_to_int32"];
  repeated string available_agents = 10 [(amesh.codegen.v1.field_custom) = "adminStringSliceToProto"];
  // Free-form host metadata; JSON-serialized for binary parity with REST.
  optional string host_info_json = 11 [
    (amesh.codegen.v1.field_rename) = "HostInfo",
    (amesh.codegen.v1.field_custom) = "adminHostInfoToProto"
  ];
  optional string last_heartbeat = 12 [(amesh.codegen.v1.field_convert) = "rfc3339_ptr"];
  string created_at = 13 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  string updated_at = 14 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  // Optional embedded org summary — composed externally by the call wrapper
  // because Runner has no Organization preload.
  optional AdminOrganizationSummary organization = 15 [(amesh.codegen.v1.field_skip) = true];
}

message AdminOrganizationSummary {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/organization.Organization"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string name = 2;
  string slug = 3;
}

message AdminAuditLog {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/admin.AuditLog"
    generate_to_proto: true
    generate_from_proto: false
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  int64 admin_user_id = 2 [(amesh.codegen.v1.field_rename) = "AdminUserID"];
  // Domain stores typed AuditAction (string alias); custom helper casts.
  string action = 3 [(amesh.codegen.v1.field_custom) = "auditActionToProto"];
  // Domain stores typed TargetType (string alias); custom helper casts.
  string target_type = 4 [(amesh.codegen.v1.field_custom) = "targetTypeToProto"];
  int64 target_id = 5 [(amesh.codegen.v1.field_rename) = "TargetID"];
  optional string old_data = 6 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string new_data = 7 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string ip_address = 8 [
    (amesh.codegen.v1.field_rename) = "IPAddress",
    (amesh.codegen.v1.field_convert) = "string_ptr"
  ];
  optional string user_agent = 9 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  string created_at = 10 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  optional AdminUserSummary admin_user = 11 [(amesh.codegen.v1.field_custom) = "userSummaryToProto"];
}

// --- Users ---

