// --- Audit logs ---

message ListAuditLogsRequest {
  optional int64 admin_user_id = 1;
  optional string action = 2;
  optional string target_type = 3;
  optional int64 target_id = 4;
  // RFC 3339 timestamps; empty string = no bound.
  optional string start_time = 5;
  optional string end_time = 6;
  optional int32 page = 7;
  optional int32 page_size = 8;
}

message ListAuditLogsResponse {
  repeated AdminAuditLog items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// --- Relays ---

// AdminRelay mirrors backend/internal/service/relay/RelayInfo. Field shape is
// REST parity (`relay_info.go:11`) — JSON struct tags match the wire names.
message AdminRelay {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/service/relay.RelayInfo"
    generate_to_proto: true
    generate_from_proto: false
  };

  string id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string url = 2 [(amesh.codegen.v1.field_rename) = "URL"];
  string region = 3;
  int32 capacity = 4 [(amesh.codegen.v1.field_convert) = "int_to_int32"];
  int32 connections = 5 [
    (amesh.codegen.v1.field_rename) = "CurrentConnections",
    (amesh.codegen.v1.field_convert) = "int_to_int32"
  ];
  double cpu_usage = 6 [(amesh.codegen.v1.field_rename) = "CPUUsage"];
  double memory_usage = 7;
  // RFC 3339 timestamp.
  string last_heartbeat = 8 [(amesh.codegen.v1.field_convert) = "rfc3339"];
  bool healthy = 9;
  int32 avg_latency_ms = 10 [
    (amesh.codegen.v1.field_rename) = "AvgLatencyMs",
    (amesh.codegen.v1.field_convert) = "int_to_int32"
  ];
  double latitude = 11;
  double longitude = 12;
}

message RelayStats {
  int32 total_relays = 1;
  int32 healthy_relays = 2;
  int32 total_connections = 3;
}

message ListRelaysRequest {}

message ListRelaysResponse {
  repeated AdminRelay items = 1;
  int32 total = 2;
}

message GetRelayRequest {
  string id = 1;
}

message GetRelayResponse {
  AdminRelay relay = 1;
}

message GetRelayStatsRequest {}

message ForceUnregisterRelayRequest {
  string id = 1;
}

message ForceUnregisterRelayResponse {
  string status = 1;
  string relay_id = 2;
}

// --- Support tickets ---

message AdminSupportTicketUser {
  int64 id = 1;
  optional string name = 2;
  string email = 3;
  optional string avatar_url = 4;
}

message AdminSupportTicket {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string category = 4;
  string status = 5;
  string priority = 6;
  optional int64 assigned_admin_id = 7;
  string created_at = 8;
  string updated_at = 9;
  optional string resolved_at = 10;
  optional AdminSupportTicketUser user = 11;
  optional AdminSupportTicketUser assigned_admin = 12;
}

message AdminSupportTicketAttachment {
  int64 id = 1;
  int64 ticket_id = 2;
  optional int64 message_id = 3;
  int64 uploader_id = 4;
  string original_name = 5;
  string mime_type = 6;
  int64 size = 7;
  string created_at = 8;
}

message AdminSupportTicketMessage {
  int64 id = 1;
  int64 ticket_id = 2;
  int64 user_id = 3;
  string content = 4;
  bool is_admin_reply = 5;
  string created_at = 6;
  optional AdminSupportTicketUser user = 7;
  repeated AdminSupportTicketAttachment attachments = 8;
}

message SupportTicketStats {
  int64 total = 1;
  int64 open = 2;
  int64 in_progress = 3;
  int64 resolved = 4;
  int64 closed = 5;
}

message ListSupportTicketsRequest {
  optional string search = 1;
  optional string status = 2;
  optional string category = 3;
  optional string priority = 4;
  optional int32 page = 5;
  optional int32 page_size = 6;
}

message ListSupportTicketsResponse {
  repeated AdminSupportTicket items = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetSupportTicketStatsRequest {}

message GetSupportTicketRequest {
  int64 id = 1;
}

// SupportTicketDetail mirrors REST `{ticket, messages}` shape — same as
// the user-side SupportTicketDetail but on the admin envelope so the
// embedded user identity is the renderer-facing variant.
message SupportTicketDetail {
  AdminSupportTicket ticket = 1;
  repeated AdminSupportTicketMessage messages = 2;
}

message ListSupportTicketMessagesRequest {
  int64 id = 1;
}

message ListSupportTicketMessagesResponse {
  repeated AdminSupportTicketMessage data = 1;
}

message UpdateSupportTicketStatusRequest {
  int64 id = 1;
  string status = 2;
}

message UpdateSupportTicketStatusResponse {
  string message = 1;
}

message AssignSupportTicketRequest {
  int64 id = 1;
  // When unset, the handler assigns the calling admin to the ticket
  // (mirrors REST behavior at support_ticket_actions.go:155).
  optional int64 admin_id = 2;
}

message AssignSupportTicketResponse {
  string message = 1;
}

message GetSupportTicketAttachmentUrlRequest {
  int64 attachment_id = 1;
}

message GetSupportTicketAttachmentUrlResponse {
  string url = 1;
}

// --- Admin auth ---

message AdminLoginRequest {
  string email = 1;
  string password = 2;
}

message AdminLoginResponse {
  string token = 1;
  string refresh_token = 2;
  AdminUser user = 3;
}

message GetMeRequest {}

// ----------------------------------------------------------------------------
// Dead-letter queue (ops surface)
// ----------------------------------------------------------------------------

// AgentMessage mirrors the GORM AgentMessage subset that the DLQ exposes
// (REST serializes the whole struct via gin.H{"entries": entries}; here we
// pick the renderer-relevant fields). Internal-only — admin tooling.
message AgentMessage {
  int64 id = 1;
  string sender_pod = 2;
  string receiver_pod = 3;
  string message_type = 4;
  string status = 5;
  int32 delivery_attempts = 6;
  int32 max_retries = 7;
  optional string last_delivery_attempt = 8;
  optional string next_retry_at = 9;
  optional string delivery_error = 10;
  optional string delivered_at = 11;
  optional string read_at = 12;
  optional int64 parent_message_id = 13;
  optional string correlation_id = 14;
  string created_at = 15;
  string updated_at = 16;
}

// DeadLetterEntry mirrors GORM agent.DeadLetterEntry.
message DeadLetterEntry {
  int64 id = 1;
  int64 original_message_id = 2;
  string reason = 3;
  int32 final_attempt = 4;
  string moved_at = 5;
  optional string replayed_at = 6;
  optional string replay_result = 7;
  string created_at = 8;
  // Eager-loaded original message (best-effort — may be absent if the
  // foreign key cascade already removed the source row).
  optional AgentMessage original_message = 9;
}

message ListDeadLettersRequest {
  // Standard {offset, limit} envelope (conventions §8). REST translated
  // {limit, offset} 1:1 — same here.
  optional int32 limit = 1;
  optional int32 offset = 2;
}

message ListDeadLettersResponse {
  repeated DeadLetterEntry items = 1;
  // total counts the returned slice length (REST behavior). A future
  // schema bump can swap this for a real count(*) when needed.
  int64 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ReplayDeadLetterRequest {
  int64 entry_id = 1;
}

message ReplayDeadLetterResponse {
  string message = 1;
  AgentMessage replayed_message = 2;
}
