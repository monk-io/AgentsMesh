// proto.auth_state.v1 — desktop NAPI auth state mutation contract.
//
// SRP-shaped messages for the Rust AuthManager surface exposed across the
// NAPI boundary. Where the wire (proto.auth.v1) already describes the
// response shape (LoginResponse, RefreshTokenResponse, User), the NAPI
// layer reuses those messages directly — only state-only semantics that
// have no wire equivalent live here.
//
// Today only `BootstrapResult` qualifies: it represents the outcome of
// AuthManager::bootstrap(), which is a Rust-side state machine over
// persisted-session restore + token refresh + identity verification.
// The result reports one of three kinds (anonymous / authenticated /
// anonymous-after-cleanup) plus the optional cleanup reason. Discrete
// values use `optional` strings (vs proto enums) so the serde derive
// emitted by the rust_prost_transform stays struct-only — protoc-gen-prost
// surfaces enums as plain Rust enums that can't be `#[serde(default)]`'d.

syntax = "proto3";

package proto.auth_state.v1;

import "auth/v1/auth.proto";
import "org/v1/org.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/auth_state/v1;authstatev1";

// AuthManager::bootstrap() outcome. Mirrors the Rust enum
// `BootstrapResult` (clients/core/crates/auth/src/bootstrap.rs) — kept as
// a flat message with `kind` discriminator (string, not proto enum, so
// the package-wide #[serde(default)] derive stays applicable).
//
// `kind` is one of: "anonymous" | "authenticated" | "anonymous_after_cleanup".
// `cleanup_reason` is present iff kind == "anonymous_after_cleanup" and is
// one of: "base_url_mismatch" | "token_expired_and_refresh_failed" |
// "unauthorized_from_identity_call" | "storage_corrupt" | "legacy_data_purged".
message BootstrapResult {
  string kind = 1;
  optional string cleanup_reason = 2;

  // Present iff `kind == "authenticated"`. Reuses the wire User shape so
  // callers downstream of bootstrap can feed it to the same decoders
  // login / refresh / verify_email pipelines already use.
  optional proto.auth.v1.User user = 3;

  // Present iff `kind == "authenticated"` AND the persisted session had a
  // current_org slug that matched one of the freshly-fetched orgs.
  optional proto.org.v1.Organization current_org = 4;
}

// Plain-list response for `auth_fetch_organizations_proto`. Distinct
// from `proto.org.v1.ListMyOrgsResponse` (which carries pagination
// metadata the AuthManager surface does not expose).
message OrganizationsList {
  repeated proto.org.v1.Organization items = 1;
}

// AuthManager::apply_session() input. Carries the freshly-issued tokens +
// user identity into the Rust SSOT after the renderer obtains them
// out-of-band (OAuth deep-link, magic-link verify, etc.). Mirrors the
// shape of `proto.auth.v1.LoginResponse` minus `expires_in` (the wasm
// path's apply_session DTO has no expires_in field).
message ApplySessionRequest {
  string token = 1;
  string refresh_token = 2;
  proto.auth.v1.User user = 3;
}

// AuthManager::replace_organizations() input. The renderer pushes the
// full org list after an OAuth callback or an org-create flow so the
// in-process Rust cache stays in lock-step with the server view.
message SetOrganizationsRequest {
  repeated proto.org.v1.Organization items = 1;
}

// AuthManager::set_current_org() input. `org` absent means "clear the
// current org" (matches the legacy JSON path's empty-string convention).
message SetCurrentOrgRequest {
  optional proto.org.v1.Organization org = 1;
}
