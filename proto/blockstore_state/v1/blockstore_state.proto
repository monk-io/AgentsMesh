// proto.blockstore_state.v1 — client-side blockstore state mutation contract.
//
// Outer container shapes (Workspace, Block, BlockRef, ApplyOpsRequest /
// ApplyOpsResult) are fully typed proto messages defined in
// proto.blockstore.v1 — the state mutations carry them directly. Only
// BlockOp.{payload,forward,inverse} and Block.{data_json,meta_json} +
// BlockRef.meta_json stay as opaque JSON strings because their per-op-kind
// or per-block-type sub-shapes vary across 200+ block-type schemas.

syntax = "proto3";

package proto.blockstore_state.v1;

import "blockstore/v1/blockstore.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/blockstore_state/v1;blockstorestatev1";

// Apply a remote BlockOp to the local SSOT cache — used by
// blockstoreSubscribe.ts when the realtime WS broadcasts an op for a
// workspace the user has loaded. BlockOp.payload/forward/inverse are
// per-op-kind variant JSON, so we carry the whole BlockOp as a JSON
// blob rather than splitting the typed outer fields.
message ApplyRemoteOpRequest {
  string op_json = 1;
}

// Bulk state population — used by JS Connect adapter callers
// (facade/blockstoreApi.ts) after fetching via the binary wire. Each
// request carries the typed proto.blockstore.v1.* container directly;
// per-blocktype data/meta (inside Block / BlockRef) remain JSON strings
// because they have 200+ subschemas that flattening would explode.

message ReplaceWorkspacesRequest {
  repeated proto.blockstore.v1.Workspace workspaces = 1;
}

message UpsertWorkspaceRequest {
  proto.blockstore.v1.Workspace workspace = 1;
}

message UpsertBlocksRequest {
  repeated proto.blockstore.v1.Block blocks = 1;
}

message UpsertRefsRequest {
  repeated proto.blockstore.v1.BlockRef refs = 1;
}

message ProjectLocalOpsRequest {
  proto.blockstore.v1.ApplyOpsRequest request = 1;
  proto.blockstore.v1.ApplyOpsResponse result = 2;
}
