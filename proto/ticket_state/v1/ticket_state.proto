// proto.ticket_state.v1 — client-side ticket state mutation contract.
//
// See proto/pod_state/v1/pod_state.proto for the full design rationale.
// This package mirrors that structure for the ticket domain.

syntax = "proto3";

package proto.ticket_state.v1;

import "ticket/v1/ticket.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/ticket_state/v1;ticketstatev1";

// Realtime ticket:status_changed event. The optional previous_status is
// used for the kanban-board transition animation.
message ApplyTicketStatusEventRequest {
  string slug = 1;
  string status = 2;
  optional string previous_status = 3;
}

// Realtime ticket:deleted event.
message ApplyTicketDeletedEventRequest {
  string slug = 1;
}

// Renderer-issued filter query against the cached ticket list. Replaces
// the legacy `filter_tickets_json(search_json, statuses_json,
// priorities_json, repo_ids_json)` 4-string-JSON binding.
message FilterTicketsRequest {
  string search = 1;
  repeated string statuses = 2;
  repeated string priorities = 3;
  repeated int64 repository_ids = 4;
}

message FilterTicketsResponse {
  repeated proto.ticket.v1.Ticket tickets = 1;
}

// Replace cached ticket list — used by fetchTickets after a listTickets
// fetch returns. Wholesale replaces the cache; the caller is the SSOT for
// "what should be visible right now" given the current filter/view combo.
message ReplaceCachedTicketsRequest {
  repeated proto.ticket.v1.Ticket tickets = 1;
}

// Insert a freshly created ticket into the cache — used by createTicket
// after the POST returns so the board / list updates immediately.
message InsertCreatedTicketRequest {
  proto.ticket.v1.Ticket ticket = 1;
}

// Patch a single cached ticket from the local update path (PUT ticket
// returns updated record). Distinct from ApplyTicketStatusEvent which
// only carries status.
message PatchCachedTicketRequest {
  string slug = 1;
  proto.ticket.v1.Ticket ticket = 2;
}

// Replace cached board columns — used by fetchBoard after a getBoard
// fetch returns.
message ReplaceBoardColumnsRequest {
  repeated proto.ticket.v1.BoardColumn columns = 1;
}

// Append paginated tickets into a board column — used by loadMoreColumn.
message AppendBoardColumnTicketsRequest {
  string status = 1;
  repeated proto.ticket.v1.Ticket tickets = 2;
}

// Set the "current ticket" (i.e. the one open in the detail pane). An
// unset `ticket` field clears the selection (used by setCurrentTicket(null)).
message SetCurrentTicketRequest {
  optional proto.ticket.v1.Ticket ticket = 1;
}

// Replace cached label list — used by fetchLabels.
message ReplaceCachedLabelsRequest {
  repeated proto.ticket.v1.Label labels = 1;
}

// Insert a freshly created label into the cache — used by createLabel.
message InsertCreatedLabelRequest {
  proto.ticket.v1.Label label = 1;
}

// Remove a label from cache — used by deleteLabel.
message RemoveCachedLabelRequest {
  int64 id = 1;
}
