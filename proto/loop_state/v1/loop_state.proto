// proto.loop_state.v1 — client-side loop state mutation contract.
//
// Distinct from proto.loop.v1 (wire schema for Connect-RPC). This package
// describes the mutation operations the renderer issues against the Rust
// loop cache through the wasm-bindgen bridge. Each message is one
// SRP-shaped intent — name describes the business event + action, not a
// generic "update loop" verb.
//
// Why a separate package: proto.loop.v1 is the wire shape between client
// and backend; this package is the in-process contract between TS and
// Rust. Different evolution rhythms, different review audiences.

syntax = "proto3";

package proto.loop_state.v1;

import "loop/v1/loop.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/loop_state/v1;loopstatev1";

// Replace cached loop list — used by `fetchLoops` after the Connect-RPC
// list call returns. Wholesale replaces the cache because the caller is
// the SSOT for "what should be visible right now" given the active
// filters.
message ReplaceCachedLoopsRequest {
  repeated proto.loop.v1.Loop loops = 1;
}

// Set the currently focused loop — used by `fetchLoop` when the user
// navigates into a loop detail page. Distinct from ClearCurrentLoop so
// the encoding path stays uniform (no null-string sentinel).
message SetCurrentLoopRequest {
  proto.loop.v1.Loop loop = 1;
}

// Renderer dismisses the current-loop selection (no slug = deselect).
message ClearCurrentLoopRequest {}

// Patch a single cached loop after an enable/disable Connect-RPC call
// completes. The slug identifies the row to replace; the carried Loop
// is the server-canonical post-action shape.
message PatchLoopFromActionRequest {
  string slug = 1;
  proto.loop.v1.Loop loop = 2;
}

// Insert a fresh LoopRun returned by TriggerLoop. Appends to the cached
// runs list so the runs table updates immediately without re-fetching.
message InsertLoopRunRequest {
  proto.loop.v1.LoopRun run = 1;
}

// Replace cached runs — used by `fetchRuns` with offset = 0 (initial
// load or filter change).
message ReplaceCachedRunsRequest {
  repeated proto.loop.v1.LoopRun runs = 1;
}

// Append cached runs — used by `loadMoreRuns` / `fetchRuns` with
// offset > 0 for pagination.
message AppendCachedRunsRequest {
  repeated proto.loop.v1.LoopRun runs = 1;
}

// Patch the status of a single cached run — used by `cancelRun` after
// the Connect-RPC cancel call succeeds. The legacy
// `update_run_status(run_id, status)` is the precursor.
message PatchLoopRunStatusRequest {
  int64 run_id = 1;
  string status = 2;
}

// Renderer drops cached runs when switching to a different loop slug.
// Existed as `clear_runs()` (no-args) on the legacy binding — kept as a
// no-arg message for API uniformity.
message ClearLoopRunsRequest {}
