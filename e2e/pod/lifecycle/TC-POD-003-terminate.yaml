id: TC-POD-003
name: 终止 Pod
description: 验证通过 API 终止 Pod 的功能
priority: high
module: pod/lifecycle

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个 Runner 在线

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用 Runner 和 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-4
    action: 创建 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Test Pod for Termination"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
      save:
        pod_key: body.pod.pod_key

  - id: step-5
    action: 终止 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          message: contains(terminated)

  - id: step-6
    action: 验证 Pod 状态为 terminated
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            pod_key: "{pod_key}"
            status: terminated

  - id: step-7
    action: 验证数据库中 Pod 状态为 terminated
    verification:
      type: database
      query: |
        SELECT pod_key, status FROM agent_pods
        WHERE pod_key = '{pod_key}'
      expected:
        status: terminated

  - id: step-8
    action: 尝试再次终止已终止的 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 400
        body:
          error: contains(terminated)
