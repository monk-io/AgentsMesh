id: TC-POD-005
name: Runner 容量管理
description: 验证 Pod 创建和终止时 Runner 容量的正确更新
priority: high
module: pod/lifecycle

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个在线 Runner

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取 Runner 列表并记录初始状态
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id
        initial_active_pods: body.runners[0].active_pods
        max_concurrent_pods: body.runners[0].max_concurrent_pods

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-4
    action: 创建第一个 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Capacity Test Pod 1"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
      save:
        pod_key_1: body.pod.pod_key

  - id: step-5
    action: 等待 Pod 1 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key_1}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-6
    action: 验证 Runner 活跃 Pod 数增加 1
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runner:
            active_pods: add({initial_active_pods}, 1)

  - id: step-7
    action: 创建第二个 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Capacity Test Pod 2"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
      save:
        pod_key_2: body.pod.pod_key

  - id: step-8
    action: 等待 Pod 2 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key_2}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-9
    action: 验证 Runner 活跃 Pod 数增加 2
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runner:
            active_pods: add({initial_active_pods}, 2)

  - id: step-10
    action: 终止第一个 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key_1}/terminate
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200

  - id: step-11
    action: 验证 Runner 活跃 Pod 数减少 1
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runner:
            active_pods: add({initial_active_pods}, 1)
      retry:
        max_attempts: 5
        interval: 2000

  - id: step-12
    action: 终止第二个 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key_2}/terminate
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200

  - id: step-13
    action: 验证 Runner 活跃 Pod 数恢复初始值
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runner:
            active_pods: "{initial_active_pods}"
      retry:
        max_attempts: 5
        interval: 2000

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key_1}/terminate
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key_2}/terminate
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
