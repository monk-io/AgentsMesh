id: TC-WS-002
name: Workspace 打开终端
description: 验证在 Workspace 中打开 Pod 终端的功能
priority: high
module: workspace/layout

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个在线 Runner

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用 Runner
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-4
    action: 创建测试 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Workspace Terminal Test"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
      save:
        pod_key: body.pod.pod_key

  - id: step-5
    action: 等待 Pod 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-6
    action: 导航到 Workspace 页面
    url: /dev-org/workspace
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'heading contains "Workspace"'
            - exists: '[data-testid="workspace-container"]'

  - id: step-7
    action: 验证终端网格区域存在
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="terminal-grid"]'
            - exists: '.terminal-container'
            - exists: '[role="terminal"]'
            - exists: '.xterm'

  - id: step-8
    action: 验证 Pod 标签显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="pod-tab"]'
            - exists: '.tab-list'
            - exists: 'button[role="tab"]'

  - id: step-9
    action: 验证可以选择 Pod 终端
    verification:
      type: ui
      steps:
        - click: '[data-testid="pod-tab"]:first-child or .tab-list button:first-child or button[role="tab"]:first-child'
          optional: true
      check:
        - one_of:
            - exists: '[data-testid="terminal-active"]'
            - exists: '.terminal-active'
            - exists: '.xterm-screen'

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
      headers:
        Authorization: Bearer {access_token}
