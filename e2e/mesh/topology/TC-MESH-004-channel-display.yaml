id: TC-MESH-004
name: Mesh Channel 节点显示
description: 验证 Mesh 拓扑页面正确显示 Channel 节点和关联的 Pod
priority: high
module: mesh/topology

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个在线 Runner

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用 Runner
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-4
    action: 创建测试 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Mesh Channel Test Pod"
      expected:
        status: 201
      save:
        pod_key: body.pod.pod_key

  - id: step-5
    action: 等待 Pod 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-6
    action: 创建 Channel
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/channels
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          name: "E2E Mesh Test Channel"
          description: "Channel for Mesh topology test"
      expected:
        status: 201
        body:
          channel:
            id: not_empty
            name: "E2E Mesh Test Channel"
      save:
        channel_id: body.channel.id

  - id: step-7
    action: Pod 加入 Channel
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/channels/{channel_id}/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          pod_key: "{pod_key}"
      expected:
        status: 200

  - id: step-8
    action: 验证拓扑 API 包含 Channel 节点
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/mesh/topology
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          topology:
            stats:
              channels: greater_than(0)

  - id: step-9
    action: 导航到 Mesh 页面
    url: /dev-org/mesh
    verification:
      type: ui
      check:
        - exists: '[data-testid="mesh-page"] or heading contains "Mesh"'

  - id: step-10
    action: 验证 Channel 节点显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="channel-node"]'
            - exists: '[data-node-type="channel"]'
            - exists: '.node-channel'
            - exists: 'text contains "Channel"'

  - id: step-11
    action: 验证 Channel 统计数更新
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'text contains "Channel"'
            - exists: '[data-testid="channel-count"]'

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/channels/{channel_id}/archive
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
