id: TC-MESH-002
name: Mesh Pod 节点显示
description: 验证 Mesh 拓扑页面正确显示 Pod 节点
priority: high
module: mesh/topology

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个在线 Runner

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取初始拓扑状态
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/mesh/topology
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
      save:
        initial_pod_count: body.topology.stats.active_pods

  - id: step-3
    action: 获取可用 Runner
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-4
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-5
    action: 创建测试 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Mesh Pod Display Test"
      expected:
        status: 201
      save:
        pod_key: body.pod.pod_key

  - id: step-6
    action: 等待 Pod 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-7
    action: 验证拓扑 API 包含新 Pod 节点
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/mesh/topology
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          topology:
            stats:
              active_pods: greater_than({initial_pod_count})
            nodes: contains_pod({pod_key})

  - id: step-8
    action: 导航到 Mesh 页面
    url: /dev-org/mesh
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="mesh-page"]'
            - exists: 'heading contains "Mesh"'

  - id: step-9
    action: 验证 Pod 节点在拓扑图中显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="pod-node"]'
            - exists: '[data-node-type="pod"]'
            - exists: '.node-pod'
            - exists: 'text contains "Pod"'

  - id: step-10
    action: 验证 Pod 状态显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-status="running"]'
            - exists: '.status-running'
            - exists: 'text contains "running" or text contains "运行"'

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
      headers:
        Authorization: Bearer {access_token}
