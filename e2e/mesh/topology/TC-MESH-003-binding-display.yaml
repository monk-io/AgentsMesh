id: TC-MESH-003
name: Mesh Binding 连接显示
description: 验证 Mesh 拓扑页面正确显示 Pod 之间的 Binding 连接
priority: high
module: mesh/topology

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个在线 Runner

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用 Runner 和 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  - id: step-4
    action: 创建 Pod A
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Mesh Binding Test Pod A"
      expected:
        status: 201
      save:
        pod_key_a: body.pod.pod_key

  - id: step-5
    action: 创建 Pod B
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          initial_prompt: "E2E Mesh Binding Test Pod B"
      expected:
        status: 201
      save:
        pod_key_b: body.pod.pod_key

  - id: step-6
    action: 等待两个 Pod 都变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods?status=running
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-7
    action: Pod A 请求 Binding 到 Pod B
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/bindings
        headers:
          Authorization: Bearer {access_token}
          X-Pod-Key: "{pod_key_a}"
          Content-Type: application/json
        body:
          target_pod: "{pod_key_b}"
          scopes:
            - "pod:read"
      expected:
        status: 201
        body:
          binding:
            id: not_empty
            status: pending
      save:
        binding_id: body.binding.id

  - id: step-8
    action: Pod B 接受 Binding
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/bindings/accept
        headers:
          Authorization: Bearer {access_token}
          X-Pod-Key: "{pod_key_b}"
          Content-Type: application/json
        body:
          binding_id: "{binding_id}"
      expected:
        status: 200
        body:
          binding:
            status: active

  - id: step-9
    action: 验证拓扑 API 包含 Binding 边
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/mesh/topology
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          topology:
            stats:
              bindings: greater_than(0)
            edges: not_empty

  - id: step-10
    action: 导航到 Mesh 页面
    url: /dev-org/mesh
    verification:
      type: ui
      check:
        - exists: '[data-testid="mesh-page"] or heading contains "Mesh"'

  - id: step-11
    action: 验证 Binding 连接线显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: '[data-testid="binding-edge"]'
            - exists: '[data-edge-type="binding"]'
            - exists: 'line or path'
            - exists: '.edge-binding'

  - id: step-12
    action: 验证 Binding 统计数更新
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'text contains "Binding"'
            - exists: '[data-testid="binding-count"]'

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key_a}/terminate
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key_b}/terminate
      headers:
        Authorization: Bearer {access_token}
      ignore_error: true
