id: TC-SCENARIO-001
name: 完整流程：Git Provider → Repository → Ticket → Pod
description: |
  验证从注册 Git Provider 到创建带 Repository 的 Pod 的完整流程：
  1. 创建 Git Credential (PAT)
  2. 导入 Repository
  3. 创建 Ticket 关联 Repository
  4. 从 Ticket 创建 Pod（带 Repository）
  5. 验证 Pod 创建成功，工作区正确初始化
priority: critical
module: scenarios/repository-to-pod
type: scenario

preconditions:
  - 开发环境已启动
  - 至少有一个 Runner 在线
  - GitLab 仓库可访问：https://gitlab.corp.signalrender.com/aio/agents/mockrepo

# 测试数据
test_data:
  gitlab_base_url: https://gitlab.corp.signalrender.com
  gitlab_pat: glpat-example-token-replace-with-real-pat
  repository_url: https://gitlab.corp.signalrender.com/aio/agents/mockrepo.git
  repository_external_id: aio/agents/mockrepo
  repository_name: mockrepo
  repository_full_path: aio/agents/mockrepo
  default_branch: main
  credential_name: E2E GitLab PAT
  host_pattern: gitlab.corp.signalrender.com

setup:
  sql: |
    -- 清理可能存在的测试数据
    DELETE FROM agent_pods WHERE initial_prompt LIKE 'E2E Scenario Test%';
    DELETE FROM tickets WHERE title LIKE 'E2E Test Ticket%';
    DELETE FROM repositories WHERE name = 'mockrepo' AND full_path = 'aio/agents/mockrepo';
    DELETE FROM user_git_credentials WHERE name = 'E2E GitLab PAT';

steps:
  # ========== Step 1: 登录获取 Token ==========
  - id: step-1
    action: 登录并获取 access_token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  # ========== Step 2: 创建 Git Credential (PAT) ==========
  - id: step-2
    action: 创建 GitLab PAT 凭证
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/git-credentials
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          name: E2E GitLab PAT
          credential_type: pat
          pat: glpat-example-token-replace-with-real-pat
          host_pattern: gitlab.corp.signalrender.com
      expected:
        status: 201
        body:
          credential:
            name: E2E GitLab PAT
            credential_type: pat
            host_pattern: gitlab.corp.signalrender.com
      save:
        git_credential_id: body.credential.id

  - id: step-2a
    action: 验证 Git Credential 已创建
    verification:
      type: database
      query: |
        SELECT id, name, credential_type, host_pattern
        FROM user_git_credentials WHERE name = 'E2E GitLab PAT'
      expected:
        name: E2E GitLab PAT
        credential_type: pat
        host_pattern: gitlab.corp.signalrender.com

  # ========== Step 3: 导入 Repository ==========
  - id: step-3
    action: 导入 GitLab Repository
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/repositories
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          provider_type: gitlab
          provider_base_url: https://gitlab.corp.signalrender.com
          clone_url: https://gitlab.corp.signalrender.com/aio/agents/mockrepo.git
          external_id: aio/agents/mockrepo
          name: mockrepo
          full_path: aio/agents/mockrepo
          default_branch: main
          visibility: organization
      expected:
        status: 201
        body:
          repository:
            name: mockrepo
            full_path: aio/agents/mockrepo
            provider_type: gitlab
            default_branch: main
      save:
        repository_id: body.repository.id

  - id: step-3a
    action: 验证 Repository 已导入
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/repositories/{repository_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          repository:
            id: "{repository_id}"
            name: mockrepo
            is_active: true

  # ========== Step 4: 创建关联 Repository 的 Ticket ==========
  - id: step-4
    action: 创建 Ticket 关联 Repository
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/tickets
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          repository_id: "{repository_id}"
          type: task
          title: E2E Test Ticket - Repository Pod Flow
          description: 测试从 Repository 创建 Pod 的完整流程
          priority: high
      expected:
        status: 201
        body:
          ticket:
            title: E2E Test Ticket - Repository Pod Flow
            type: task
            repository_id: "{repository_id}"
      save:
        ticket_id: body.ticket.id
        ticket_slug: body.ticket.slug

  - id: step-4a
    action: 验证 Ticket 已创建并关联 Repository
    verification:
      type: database
      query: |
        SELECT id, title, type, repository_id, slug
        FROM tickets WHERE id = {ticket_id}
      expected:
        title: E2E Test Ticket - Repository Pod Flow
        type: task
        repository_id: "{repository_id}"

  # ========== Step 5: 获取 Runner 和 Agent 类型 ==========
  - id: step-5
    action: 获取可用 Runner 列表
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id
        runner_name: body.runners[0].description
        initial_active_pods: body.runners[0].active_pods

  - id: step-5a
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agents: not_empty
      save:
        agent_slug: body.agents[0].slug

  # ========== Step 6: 从 Ticket 创建 Pod（带 Repository）==========
  - id: step-6
    action: 创建 Pod 关联 Ticket 和 Repository
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_slug: "{agent_slug}"
          repository_id: "{repository_id}"
          ticket_id: "{ticket_id}"
          branch_name: main
          initial_prompt: "E2E Scenario Test - Repository Pod Flow - Ticket: {ticket_slug}"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
            repository_id: "{repository_id}"
            ticket_id: "{ticket_id}"
      save:
        pod_key: body.pod.pod_key

  # ========== Step 7: 等待 Pod 状态变为 running ==========
  - id: step-7
    action: 等待 Pod 状态变为 running（最多 60 秒）
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 20
        interval: 3000

  # ========== Step 8: 验证 Runner 活跃 Pod 数增加 ==========
  - id: step-8
    action: 验证 Runner 活跃 Pod 数增加
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/{runner_id}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runner:
            active_pods: greater_than({initial_active_pods})

  # ========== Step 9: UI 验证 - 导航到 Workspace ==========
  - id: step-9
    action: 导航到 Workspace 页面
    url: /dev-org/workspace
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'text contains "工作区"'
            - exists: 'heading contains "Workspace"'

  - id: step-9a
    action: 验证 Pod 在 Workspace 列表中显示
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'text contains "{pod_key}"'
            - exists: '[data-testid="pod-item"]'

  # ========== Step 10: 数据库验证 ==========
  - id: step-10
    action: 验证数据库中 Pod 关联关系
    verification:
      type: database
      query: |
        SELECT pod_key, status, repository_id, ticket_id, initial_prompt
        FROM agent_pods WHERE pod_key = '{pod_key}'
      expected:
        pod_key: "{pod_key}"
        status: running
        repository_id: "{repository_id}"
        ticket_id: "{ticket_id}"

  # ========== Step 11: 清理 - 终止 Pod ==========
  - id: step-11
    action: 终止 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          message: contains(terminated)

  - id: step-11a
    action: 验证 Pod 状态变为 terminated
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: terminated
      retry:
        max_attempts: 5
        interval: 2000

cleanup:
  - sql: |
      -- 清理测试数据
      UPDATE agent_pods SET status = 'terminated', terminated_at = NOW()
      WHERE pod_key = '{pod_key}' AND status != 'terminated';

      DELETE FROM tickets WHERE title LIKE 'E2E Test Ticket%';
      DELETE FROM repositories WHERE name = 'mockrepo' AND full_path = 'aio/agents/mockrepo';
      DELETE FROM user_git_credentials WHERE name = 'E2E GitLab PAT';
