id: TC-AGENTCRED-006
name: Agent 凭证完整 CRUD 流程（创建 → 查看 → 更新 → 设默认 → 删除）
description: |
  验证用户通过 UI 完整管理 Agent 凭证的流程：
  1. 登录并导航到 Agent 设置页面
  2. 选择 Agent 类型（如 Claude Code）
  3. 创建新的凭证配置
  4. 验证凭证出现在列表中
  5. 更新凭证名称
  6. 将凭证设为默认
  7. 删除凭证
  8. 验证凭证从列表移除
priority: high
module: account/agent-credentials
type: scenario

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 存在可用的 Agent 类型

setup:
  sql: |
    -- 清理可能存在的测试凭证
    DELETE FROM agent_credential_profiles WHERE name LIKE 'E2E Agent Credential%';

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用的 Agent 类型
    verification:
      type: database
      query: |
        SELECT slug, name FROM agents WHERE is_active = true LIMIT 1
      expected:
        slug: not_empty
      save:
        agent_slug: slug
        agent_name: name

  - id: step-3
    action: 导航到 Agent 设置页面
    url: /settings/agents
    verification:
      type: ui
      check:
        - one_of:
            - exists: 'heading contains "Agent"'
            - exists: 'text contains "凭证" or text contains "Credentials"'
            - exists: 'text contains "Claude" or text contains "Aider"'

  - id: step-4
    action: 选择 Agent 类型并点击添加凭证
    verification:
      type: ui
      steps:
        - click: 'tab contains "{agent_name}" or button contains "{agent_name}"'
          optional: true
        - click: 'button contains "添加" or button contains "Add" or button contains "新建"'
      check:
        - exists: 'dialog or [role="dialog"]'

  - id: step-5
    action: 填写凭证配置并保存
    verification:
      type: ui
      steps:
        - fill: 'textbox "名称" or textbox "Name" or textbox "配置名称"'
          value: E2E Agent Credential
        - fill: 'textbox "API Key" or textbox "ANTHROPIC_API_KEY" or textbox contains "key"'
          value: sk-ant-test-key-12345678901234567890
        - click: 'button contains "保存" or button contains "Save" or button contains "创建"'
      check:
        - not_exists: 'dialog or [role="dialog"]'

  - id: step-6
    action: 验证凭证出现在列表中
    verification:
      type: ui
      check:
        - contains: "E2E Agent Credential"

  - id: step-7
    action: 验证数据库中凭证已创建
    verification:
      type: database
      query: |
        SELECT name, is_default FROM agent_credential_profiles
        WHERE name = 'E2E Agent Credential'
      expected:
        name: E2E Agent Credential
      save:
        profile_id: id

  - id: step-8
    action: 点击编辑凭证
    verification:
      type: ui
      steps:
        - click: 'row:has-text("E2E Agent Credential") button contains "编辑" or button[aria-label*="编辑"]'
          fallback:
            - click: 'card:has-text("E2E Agent Credential") button[aria-label*="更多"]'
            - click: 'menuitem "编辑" or menuitem "Edit"'
      check:
        - exists: 'dialog or [role="dialog"]'

  - id: step-9
    action: 更新凭证名称
    verification:
      type: ui
      steps:
        - clear: 'textbox "名称" or textbox "Name"'
        - fill: 'textbox "名称" or textbox "Name"'
          value: E2E Agent Credential Updated
        - click: 'button contains "保存" or button contains "Save" or button contains "更新"'
      check:
        - contains: "E2E Agent Credential Updated"

  - id: step-10
    action: 验证数据库中名称已更新
    verification:
      type: database
      query: |
        SELECT name FROM agent_credential_profiles
        WHERE name = 'E2E Agent Credential Updated'
      expected:
        name: E2E Agent Credential Updated

  - id: step-11
    action: 设置凭证为默认
    verification:
      type: ui
      steps:
        - click: 'card:has-text("E2E Agent Credential Updated") button contains "默认" or button contains "Default"'
          fallback:
            - click: 'card:has-text("E2E Agent Credential Updated") button[aria-label*="更多"]'
            - click: 'menuitem "设为默认" or menuitem "Set as default"'
      check:
        - one_of:
            - contains: "默认"
            - contains: "default"

  - id: step-12
    action: 通过 API 验证已设为默认
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/users/agent-credentials/types/{agent_slug}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          profiles:
            - name: E2E Agent Credential Updated
              is_default: true

  - id: step-13
    action: 删除凭证
    verification:
      type: ui
      steps:
        - click: 'card:has-text("E2E Agent Credential Updated") button contains "删除" or button[aria-label*="删除"]'
          fallback:
            - click: 'card:has-text("E2E Agent Credential Updated") button[aria-label*="更多"]'
            - click: 'menuitem "删除" or menuitem "Delete"'
        - click: 'button contains "确认" or button contains "Confirm"'
          in_dialog: true
      check:
        - not_contains: "E2E Agent Credential Updated"

  - id: step-14
    action: 验证数据库中凭证已删除
    verification:
      type: database
      query: |
        SELECT COUNT(*) as count FROM agent_credential_profiles
        WHERE name LIKE 'E2E Agent Credential%'
      expected:
        count: 0

cleanup:
  - sql: |
      DELETE FROM agent_credential_profiles WHERE name LIKE 'E2E Agent Credential%';
