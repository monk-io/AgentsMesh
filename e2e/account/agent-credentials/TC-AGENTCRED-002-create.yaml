id: TC-AGENTCRED-002
name: 创建 Agent 凭证配置
description: 验证为特定 Agent 类型创建凭证配置
priority: high
module: account/agent-credentials

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token
  - 数据库中存在 agents 记录

notes: |
  需要先确认系统中有效的 agent_slug。
  通常 Claude Code 的 agent_slug 为 "claude"。

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 获取有效的 agent_slug
    verification:
      type: database
      query: |
        SELECT slug FROM agents WHERE is_active = true LIMIT 1
      expected:
        slug: not_empty
      save:
        agent_slug: slug

  - action: 创建 Agent 凭证配置
    expected: 返回 201，配置创建成功
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/agent-credentials/types/{agent_slug}
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          name: E2E Test Profile
          description: E2E test credential profile
          is_runner_host: false
          credentials:
            ANTHROPIC_API_KEY: sk-ant-test-key-e2e
          is_default: false
      expected:
        status: 201
        body:
          profile:
            name: E2E Test Profile
            is_runner_host: false
      save:
        profile_id: body.profile.id

  - action: 验证配置已创建
    verification:
      type: database
      query: |
        SELECT name, is_runner_host
        FROM agent_credential_profiles WHERE name = 'E2E Test Profile'
      expected:
        name: E2E Test Profile
        is_runner_host: false

cleanup:
  - sql: |
      DELETE FROM agent_credential_profiles WHERE name = 'E2E Test Profile';
