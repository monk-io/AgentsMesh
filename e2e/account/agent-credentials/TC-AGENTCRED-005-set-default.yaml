id: TC-AGENTCRED-005
name: 设置默认 Agent 凭证
description: 验证将 Agent 凭证配置设为默认
priority: high
module: account/agent-credentials

preconditions:
  - 开发环境已启动
  - 已获取有效的 access_token

steps:
  - action: 登录获取 token
    expected: 返回 200，获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - action: 获取有效的 agent_slug
    verification:
      type: database
      query: |
        SELECT slug FROM agents WHERE is_active = true LIMIT 1
      expected:
        slug: not_empty
      save:
        agent_slug: slug

  - action: 创建测试配置
    expected: 返回 201，获取配置 ID
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/agent-credentials/types/{agent_slug}
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          name: Default Test Profile
          is_runner_host: false
          credentials:
            ANTHROPIC_API_KEY: sk-ant-default-test
          is_default: false
      expected:
        status: 201
        body:
          profile:
            id: not_empty
      save:
        profile_id: body.profile.id

  - action: 设置为默认配置
    expected: 返回 200
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/users/agent-credentials/profiles/{profile_id}/set-default
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          message: contains "default"
          profile:
            is_default: true

  - action: 验证数据库已更新
    verification:
      type: database
      query: |
        SELECT is_default FROM user_agent_credential_profiles WHERE name = 'Default Test Profile'
      expected:
        is_default: true

cleanup:
  - sql: |
      DELETE FROM user_agent_credential_profiles WHERE name = 'Default Test Profile';
