name: Bazel

# Green-only CI — every job in this workflow is individually verified
# on the composed-honking-lemur branch before merge. Jobs that touch
# targets still in progress (Next.js build, iOS, OCI images) live in
# legacy workflows (ci.yml / e2e.yml / ios.yml / release.yml) and will
# migrate one at a time.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: bazel-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Smoke (info + buildifier)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - run: bazel info workspace
      - run: bazel run //:buildifier_check

  go:
    name: Go (backend + runner + relay + agentfile + proto)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      # Full Go module graph — Bazel figures out what changed since the
      # last cached run and only recompiles / retests the affected
      # packages. CGO is enabled so SQLite-backed integration tests
      # (backend/internal/testkit) compile; release builds flip to
      # pure Go via --config=release.
      # --flaky_test_attempts=3: TestPtyReaderForwardsOutput is a
      # PTY/TCP-timing test that occasionally hits i/o timeouts under
      # CI load. The timeout is 2s; local runs are consistently green.
      - run: bazel test --flaky_test_attempts=3 //backend/... //runner/... //relay/... //agentfile/... //proto/...

  rust:
    name: Rust Core (clients/core)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      # Every crate under clients/core/crates/... has a Bazel target;
      # 11 test targets were green on the migration branch. The
      # ffi/wasm/xcframework cross-language products are exercised by
      # the iOS / web jobs (not yet on Bazel CI).
      # --build_tests_only: skip building non-test library targets in
      # the same packages — some (ffi xcframework, wasm_pkg) require
      # Apple / wasm-bindgen toolchains not present on ubuntu runners.
      # --deleted_packages: skip loading clients/core/crates/ffi
      # entirely. Its BUILD.bazel calls apple_static_xcframework +
      # rust_static_library with attrs that only resolve under
      # rules_apple's Apple-host toolchains, so `//...` fails to load
      # on ubuntu. iOS CI (macOS runners) owns the ffi analysis.
      - run: bazel test --build_tests_only --deleted_packages=clients/core/crates/ffi //clients/core/crates/...

  # =========================================================================
  # TODO: jobs below are in progress. They remain in legacy workflows
  # (ci.yml / e2e.yml / ios.yml / release.yml) until each unblocks here.
  # =========================================================================

  # web:
  #   Blocked on: next_app() label format for `next_js_binary`; Vitest
  #   blocked on aspect_rules_js nested-importer ESM/CJS boundary.
  #   Playwright e2e targets (//clients/web:e2e,
  #   //clients/web/e2e-playwright:e2e, //clients/desktop:e2e) are
  #   green locally but need dev-stack setup in CI before enabling.

  # ios:
  #   Blocked on: rules_apple fork attr alignment for
  #   apple_static_xcframework + rust_static_library slicing.

  # oci-images:
  #   Ready (go_oci_image macro green in Phase 1) but we want the
  #   OCI-load/run smoke test in place before replacing release.yml's
  #   docker build path.
