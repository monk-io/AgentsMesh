name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  REGISTRY_PREFIX: "public.ecr.aws/docker/library/"

jobs:
  # ===========================================================================
  # Backend (Go)
  # ===========================================================================

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentsmesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/agentsmesh_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: false

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          install-mode: goinstall
          version: latest
          args: --timeout=5m

  # ===========================================================================
  # Runner (Go)
  # ===========================================================================

  runner-test:
    name: Runner Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: Download dependencies
        working-directory: runner
        run: go mod download

      - name: Run tests
        working-directory: runner
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: runner/coverage.out
          flags: runner
          fail_ci_if_error: false

  runner-lint:
    name: Runner Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: runner
          install-mode: goinstall
          version: latest
          args: --timeout=5m

  runner-test-windows:
    name: Runner Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runner/go.sum

      - name: Download dependencies
        working-directory: runner
        run: go mod download

      - name: Run tests
        working-directory: runner
        shell: bash
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: runner/coverage.out
          flags: runner-windows
          fail_ci_if_error: false

  # ===========================================================================
  # Relay (Go)
  # ===========================================================================

  relay-test:
    name: Relay Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: relay/go.sum

      - name: Download dependencies
        working-directory: relay
        run: go mod download

      - name: Run tests
        working-directory: relay
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: relay/coverage.out
          flags: relay
          fail_ci_if_error: false

  relay-lint:
    name: Relay Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: relay/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: relay
          install-mode: goinstall
          version: latest
          args: --timeout=5m

  # ===========================================================================
  # Web (Next.js)
  # ===========================================================================

  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: web
        run: pnpm lint

      - name: Run type check
        working-directory: web
        run: pnpm type-check

      - name: Run tests
        working-directory: web
        run: pnpm test:coverage

  # ===========================================================================
  # Web-Admin (Next.js)
  # ===========================================================================

  web-admin-test:
    name: Web-Admin Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web-admin/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web-admin
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: web-admin
        run: pnpm lint

      - name: Run build
        working-directory: web-admin
        run: pnpm build

  # ===========================================================================
  # Docker Build Verification (PR only)
  # ===========================================================================

  docker-build-verify:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: ci/backend.Dockerfile
            context: .
            use_ecr: true
          - service: web
            dockerfile: ci/web.Dockerfile
            context: ./web
            use_ecr: false
          - service: web-admin
            dockerfile: ci/web-admin.Dockerfile
            context: ./web-admin
            use_ecr: false
          - service: runner
            dockerfile: ci/runner.Dockerfile
            context: .
            use_ecr: true
          - service: relay
            dockerfile: ci/relay.Dockerfile
            context: .
            use_ecr: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=public.ecr.aws/vend/moby/buildkit:buildx-stable-1

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            REGISTRY_PREFIX=${{ matrix.use_ecr && env.REGISTRY_PREFIX || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
