# Production release pipeline — triggered by main branch pushes and
# version tags. Separate from bazel.yml (PR gate) because this workflow
# runs against self-hosted deploy runners and coordinates dual-region
# rollout (US West + CN) plus GoReleaser for the runner CLI.
#
# Image build strategy:
#   All services (backend / runner / relay / web / web-admin) build via
#   Bazel rules_oci. Each target exposes `//<path>:image_push_dockerhub`
#   and `:image_push_agentsmesh`; the tag list (latest + version +
#   minor) is stamped from `build_defs/workspace_status.sh`, which reads the
#   IMAGE_VERSION + IMAGE_MINOR env vars this workflow sets.

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  DOCKERHUB_REGISTRY: docker.io
  AGENTSMESH_REGISTRY: registry.agentsmesh.ai

jobs:
  # ===========================================================================
  # Detect which services have changed files
  # ===========================================================================

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      web-admin: ${{ steps.filter.outputs.web-admin }}
      relay: ${{ steps.filter.outputs.relay }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'proto/**'
              - 'agentfile/**'
            web:
              - 'clients/web/**'
            web-admin:
              - 'clients/web-admin/**'
            relay:
              - 'relay/**'
            migrations:
              - 'backend/migrations/**'

  # ===========================================================================
  # Compute version tag once — shared by every build-images matrix shard.
  # ===========================================================================

  version:
    name: Compute Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      minor: ${{ steps.compute.outputs.minor }}
    steps:
      - uses: actions/checkout@v6
      - id: compute
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # v1.2.3 → version=1.2.3, minor=1.2
            full="${GITHUB_REF#refs/tags/v}"
            minor="${full%.*}"
          else
            # main push → version=sha-abc1234, minor=latest (deduplicates
            # against the always-on 'latest' tag but harmless)
            full="sha-${GITHUB_SHA::7}"
            minor="latest"
          fi
          echo "version=${full}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Build + push Docker images via Bazel rules_oci (dual-registry).
  # ===========================================================================

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            target: //backend/cmd/server:image
          - service: runner
            target: //runner/cmd/runner:image
          - service: relay
            target: //relay/cmd/relay:image
          - service: web
            target: //clients/web:image
          - service: web-admin
            target: //clients/web-admin:image
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to AgentsMesh Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.AGENTSMESH_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # rules_oci's oci_push reads ~/.docker/config.json for auth, so
      # the two `docker login` steps above already provisioned creds.
      # bazel run invokes the push action which tags via the stamped
      # build_defs/workspace_status.sh keys.
      - name: Push to Docker Hub
        env:
          IMAGE_VERSION: ${{ needs.version.outputs.version }}
          IMAGE_MINOR: ${{ needs.version.outputs.minor }}
        run: |
          bazel run \
            --stamp \
            --workspace_status_command=build_defs/workspace_status.sh \
            ${{ matrix.target }}_push_dockerhub

      - name: Push to AgentsMesh Registry
        env:
          IMAGE_VERSION: ${{ needs.version.outputs.version }}
          IMAGE_MINOR: ${{ needs.version.outputs.minor }}
        run: |
          bazel run \
            --stamp \
            --workspace_status_command=build_defs/workspace_status.sh \
            ${{ matrix.target }}_push_agentsmesh

  # ===========================================================================
  # Deploy US West production (independent parallel jobs, changes-based)
  # ===========================================================================

  deploy-uswest-backend:
    name: Deploy US West Backend
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.backend == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service backend --version ${VERSION}"

  deploy-uswest-web:
    name: Deploy US West Web
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.web == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service web --version ${VERSION}"

  deploy-uswest-web-admin:
    name: Deploy US West Web-Admin
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.web-admin == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./deploy.sh uswest-prod --service web-admin --version ${VERSION}"

  deploy-uswest-relay-01:
    name: Deploy US West Relay 01
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          ssh aliyun-us-west-relay-001 "cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-01 --pull"

  deploy-uswest-relay-beijing-02:
    name: Deploy US West Relay Beijing 02
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          ssh aliyun-agentsmesh-us-relay-beijing-002 "cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-beijing-02 --pull"

  migrate-uswest:
    name: Migrate US West
    needs: [changes, deploy-uswest-backend]
    if: always() && needs.changes.outputs.migrations == 'true' && needs.deploy-uswest-backend.result == 'success'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./migrate.sh uswest-prod --direction up"

  # ===========================================================================
  # Deploy China production (independent parallel jobs, changes-based)
  # ===========================================================================

  deploy-cn-backend:
    name: Deploy CN Backend
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.backend == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service backend --version ${VERSION}"

  deploy-cn-web:
    name: Deploy CN Web
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.web == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web --version ${VERSION}"

  deploy-cn-web-admin:
    name: Deploy CN Web-Admin
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.web-admin == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-s001 "cd /opt/agentsmesh && ./deploy.sh cn-prod --service web-admin --version ${VERSION}"

  deploy-cn-relay-01:
    name: Deploy CN Relay 01
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          ssh aliyun-cn-relay-01 "cd /opt/agentsmesh/relay && ./deploy.sh cn-relay-01 --pull"

  migrate-cn:
    name: Migrate CN
    needs: [changes, deploy-cn-backend]
    if: always() && needs.changes.outputs.migrations == 'true' && needs.deploy-cn-backend.result == 'success'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          ssh aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --direction up"

  # ===========================================================================
  # Build Runner CLI + Create GitHub Release (tag only)
  # Runner is a client-side binary distributed via GitHub Release, not Docker.
  # ===========================================================================

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Bazel cross-compiles 6 platform binaries (linux/darwin/windows ×
      # amd64/arm64), packs each into tar.gz/zip, and emits checksums.txt.
      # The hermetic Go SDK + rules_pkg replace the goreleaser-action that
      # previously did the same job via `go build` + nfpm. See
      # build_defs/release/release_bundle.bzl.
      - name: Build release assets
        run: bazel build //runner/cmd/runner:release_assets

      # Install rcodesign — cross-platform Apple code signing tool. Runs on
      # ubuntu-latest because rcodesign signs Mach-O binaries from any host
      # OS (signing is byte-level patching, not a macOS-only API).
      - name: Install rcodesign
        run: |
          RCODESIGN_VERSION="0.29.0"
          cd /tmp
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo cp ./apple-codesign-*/rcodesign /usr/local/bin/
          rm -rf ./apple-codesign-*

      # Bazel can't include stamp data in output filenames (analysis-time
      # constraint), so we copy + rename to insert the version segment
      # before uploading. Final names: `agentsmesh-runner_<TAG>_<goos>_<goarch>.{tar.gz,zip}`.
      # macOS archives get re-packed after rcodesign signs the binary in place.
      - name: Stage + sign release artifacts
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          ENTITLEMENTS: ${{ github.workspace }}/runner/build/darwin/entitlements.plist
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          mkdir -p release-staging
          sign_script="${GITHUB_WORKSPACE}/runner/build/scripts/sign-darwin.sh"

          for arch in bazel-bin/runner/cmd/runner/agentsmesh-runner_*.tar.gz \
                     bazel-bin/runner/cmd/runner/agentsmesh-runner_*.zip; do
              base="$(basename "$arch")"
              new_name="${base/agentsmesh-runner_/agentsmesh-runner_${version}_}"
              dest="${GITHUB_WORKSPACE}/release-staging/${new_name}"

              # macOS binaries need rcodesign before being repacked. Linux /
              # Windows archives pass through unchanged.
              if [[ "$base" == *darwin*.tar.gz ]]; then
                  tmp="$(mktemp -d)"
                  tar -xzf "$arch" -C "$tmp"
                  (cd "$tmp" && "$sign_script" agentsmesh-runner)
                  tar -C "$tmp" -czf "$dest" agentsmesh-runner README.md LICENSE
                  rm -rf "$tmp"
              else
                  cp "$arch" "$dest"
              fi
          done

          # Recompute checksums.txt against the FINAL staged archives. The
          # Bazel-emitted checksums.txt is invalid for darwin entries
          # (re-packed after signing) and uses the pre-rename names.
          # `sha256sum` (GNU coreutils) is preinstalled on ubuntu-latest;
          # macOS runners don't run this job, so no `shasum` fallback needed.
          (
              cd release-staging
              sha256sum agentsmesh-runner_*.tar.gz agentsmesh-runner_*.zip > checksums.txt
          )
          ls -la release-staging/
          cat release-staging/checksums.txt

      # Generate the release notes from `git log` between the previous
      # tag and this one. Replaces GoReleaser's `changelog:` block —
      # same conventional-commit grouping, no extra tooling.
      - name: Generate changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || echo "")"
          {
            echo "## AgentsMesh Runner v${version}"
            echo ""
            echo "AgentsMesh Runner is an AI Agent task executor that connects to the AgentsMesh server and executes AI agent tasks in isolated terminal environments."
            echo ""
            echo "### Quick Install"
            echo ""
            echo '**macOS / Linux (one-line):**'
            echo '```bash'
            echo 'curl -fsSL https://agentsmesh.ai/install.sh | sh'
            echo '```'
            echo ""
            echo '**Windows (PowerShell):**'
            echo '```powershell'
            echo 'irm https://agentsmesh.ai/install.ps1 | iex'
            echo '```'
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "### Changes since ${previous_tag}"
              echo ""
              # Conventional-commit groups, mirroring the old goreleaser config.
              for prefix in "feat" "fix" "perf"; do
                title=""
                case "$prefix" in
                  feat) title="### New Features" ;;
                  fix) title="### Bug Fixes" ;;
                  perf) title="### Performance" ;;
                esac
                entries="$(git log "${previous_tag}..${GITHUB_REF}" --pretty=format:'- %s' | grep -E "^- ${prefix}(\(.+\))?!?:" || true)"
                if [[ -n "$entries" ]]; then
                  echo "$title"
                  echo ""
                  echo "$entries"
                  echo ""
                fi
              done
            fi
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          # `gh release create` is idempotent on tag re-runs (returns 0 + a
          # warning if the release already exists). Pre-release detection
          # mirrors goreleaser's `prerelease: auto` (anything with a `-`).
          prerelease_flag=""
          if [[ "$version" == *-* ]]; then
              prerelease_flag="--prerelease"
          fi
          gh release create "${GITHUB_REF#refs/tags/}" \
              --title "AgentsMesh Runner v${version}" \
              --notes-file release-notes.md \
              $prerelease_flag \
              release-staging/*

  # ===========================================================================
  # Build AgentsMesh Desktop installers (tag only)
  # Per-OS matrix because electron-builder calls native packagers
  # (`hdiutil` on macOS, `nsis` on Windows, AppImage on Linux). Output
  # is uploaded as a Release asset alongside the Runner CLI.
  #
  # `needs: [release]` because we attach desktop installers to the same
  # GitHub Release the runner CLI created — `gh release upload` requires
  # the release to already exist. `--clobber` makes it idempotent on
  # rerun.
  # ===========================================================================

  desktop-package:
    name: Desktop ${{ matrix.os.label }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - label: macOS
            runner: macos-14
            # `latest-mac.yml` ships next to the dmg/zip so electron-
            # updater can poll the release for new versions.
            installers: |
              AgentsMesh-*.dmg
              AgentsMesh-*.zip
              latest-mac.yml
          - label: Windows
            runner: windows-latest
            installers: |
              AgentsMesh*.exe
              latest.yml
          - label: Linux
            runner: ubuntu-latest
            installers: |
              AgentsMesh-*.AppImage
              agentsmesh*.deb
              latest-linux.yml
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # `electron_builder_app(version = ...)` writes into the synthesised
      # package.json that electron-builder consumes for installer file
      # names. Bazel's `write_file` can't read `--stamp` STABLE_* keys,
      # so we patch the literal at workflow time. The `DESKTOP_VERSION_STAMP`
      # marker in BUILD.bazel keys the sed to the next `version = "..."`
      # line, so bumping the dev placeholder doesn't drift the regex.
      - name: Stamp desktop version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          # `sed -E /marker/{n;s/.../.../}` — match marker, advance one
          # line (the `version =` line), substitute. Works on both BSD
          # (macOS runner) and GNU sed.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
              sed -i '' -E '/DESKTOP_VERSION_STAMP/{n;s/version = "[^"]+"/version = "'"$version"'"/;}' clients/desktop/BUILD.bazel
          else
              sed -i -E '/DESKTOP_VERSION_STAMP/{n;s/version = "[^"]+"/version = "'"$version"'"/;}' clients/desktop/BUILD.bazel
          fi
          grep -A1 DESKTOP_VERSION_STAMP clients/desktop/BUILD.bazel

      # `:dist` runs the full electron-vite + electron-builder pipeline.
      # Sandbox is bypassed for the action (hdiutil / nsis / AppImage
      # need real filesystem access), but Bazel's input/output graph
      # still tracks the closure. ~3:30 from cold cache, dominated by
      # the 100MB electron download.
      #
      # Signing matrix:
      #   macOS  — CSC_LINK from MACOS_CERTIFICATE; notarization via
      #            APPLE_API_KEY (path to .p8 decoded below) +
      #            APPLE_API_KEY_ID + APPLE_API_ISSUER. We use the
      #            App Store Connect API key path because the .p8 secret
      #            already exists for the Runner CLI rcodesign flow.
      #   Windows — CSC_LINK from WIN_CSC_LINK (Authenticode .pfx) +
      #             WIN_CSC_KEY_PASSWORD. electron-builder reuses the
      #             same env names cross-platform.
      #   Linux  — unsigned (AppImage GPG + .deb signing not wired).
      #
      # Bazel's exec sandbox strips arbitrary host env from actions; the
      # `--action_env` flags below allowlist the signing vars so they
      # reach the electron-builder subprocess inside the action.
      - name: Stage macOS notarization API key
        if: matrix.os.runner == 'macos-14'
        shell: bash
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_B64:-}" ]]; then
            echo "WARN: APPLE_API_KEY secret not set — notarization will be skipped." >&2
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/apple"
          # @electron/notarize (electron-builder's notarization driver)
          # accepts APPLE_API_KEY as a file path, not the .p8 contents.
          # Decode here, then expose the path via $GITHUB_ENV for the
          # build step that follows.
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/apple/AuthKey.p8"
          chmod 0600 "$RUNNER_TEMP/apple/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build :dist (macOS)
        if: matrix.os.runner == 'macos-14'
        shell: bash
        run: |
          bazel build //clients/desktop:dist \
            --build_tag_filters=electron_builder \
            --action_env=CSC_LINK \
            --action_env=CSC_KEY_PASSWORD \
            --action_env=APPLE_API_KEY \
            --action_env=APPLE_API_KEY_ID \
            --action_env=APPLE_API_ISSUER
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          # APPLE_API_KEY is exported to $GITHUB_ENV by the previous
          # step (path to the decoded .p8 file).

      - name: Build :dist (Windows)
        if: matrix.os.runner == 'windows-latest'
        shell: bash
        run: |
          bazel build //clients/desktop:dist \
            --build_tag_filters=electron_builder \
            --action_env=CSC_LINK \
            --action_env=CSC_KEY_PASSWORD
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build :dist (Linux)
        if: matrix.os.runner == 'ubuntu-latest'
        shell: bash
        run: bazel build //clients/desktop:dist --build_tag_filters=electron_builder

      # Attach installers + electron-updater metadata to the GitHub
      # Release the `release` job created. Single matrix shard's worth
      # per call; `--clobber` lets reruns overwrite without erroring.
      - name: Upload installers to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: bazel-bin/clients/desktop/dist
        run: |
          set -euo pipefail
          ls -la
          tag="${GITHUB_REF#refs/tags/}"
          files=()
          while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              for f in $pattern; do
                  [ -f "$f" ] && files+=("$f")
              done
          done <<< "${{ matrix.os.installers }}"
          if [ ${#files[@]} -eq 0 ]; then
              echo "ERROR: no installers matched any pattern; refusing to noop." >&2
              exit 1
          fi
          echo "Uploading: ${files[*]}"
          gh release upload "$tag" --clobber "${files[@]}"
