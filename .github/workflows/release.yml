# Tag a versioned release: build runner CLI archives, create a GitHub
# Release, package Desktop installers across mac/win/linux, attach
# everything as Release assets.
#
# Triggered ONLY on `vX.Y.Z` tags. Server-side OCI image build +
# deploy + migrate live in `.github/workflows/deploy.yml` and run on
# main pushes — they don't repeat for tag pushes (since v0.30.0
# they did, wasting 5–15 min/tag for zero new artifacts).

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ===========================================================================
  # Compute version from the pushed tag.
  # ===========================================================================

  version:
    name: Compute Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      minor: ${{ steps.compute.outputs.minor }}
    steps:
      - uses: actions/checkout@v6
      - id: compute
        run: |
          set -euo pipefail
          # v1.2.3 → version=1.2.3, minor=1.2
          full="${GITHUB_REF#refs/tags/v}"
          minor="${full%.*}"
          echo "version=${full}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Build Runner CLI release archives (6-platform tar.gz/zip + checksums)
  # and publish a GitHub Release. Independent of OCI image build:
  # `release_assets` is a host build via Bazel cross-compile, not a
  # docker push — does not need the deploy.yml `build-images` step.
  # ===========================================================================

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Bazel cross-compiles 6 platform binaries (linux/darwin/windows ×
      # amd64/arm64), packs each into tar.gz/zip, and emits checksums.txt.
      # The hermetic Go SDK + rules_pkg replace the goreleaser-action that
      # previously did the same job via `go build` + nfpm. See
      # build_defs/release/release_bundle.bzl.
      #
      # `--stamp` + `workspace_status.sh` injects the tag into
      # `main.version` via the `cross_binary(x_defs)` template (see
      # build_defs/release/cross_binary.bzl). Without these flags the
      # binaries ship the source-tree placeholder `"dev"`.
      - name: Build release assets
        env:
          IMAGE_VERSION: ${{ needs.version.outputs.version }}
          IMAGE_MINOR: ${{ needs.version.outputs.minor }}
        run: |
          bazel build \
            --stamp \
            --workspace_status_command=build_defs/workspace_status.sh \
            //runner/cmd/runner:release_assets

      # Install rcodesign — cross-platform Apple code signing tool. Runs on
      # ubuntu-latest because rcodesign signs Mach-O binaries from any host
      # OS (signing is byte-level patching, not a macOS-only API).
      - name: Install rcodesign
        run: |
          RCODESIGN_VERSION="0.29.0"
          cd /tmp
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo cp ./apple-codesign-*/rcodesign /usr/local/bin/
          rm -rf ./apple-codesign-*

      # Bazel can't include stamp data in output filenames (analysis-time
      # constraint), so we copy + rename to insert the version segment
      # before uploading. Final names: `agentsmesh-runner_<TAG>_<goos>_<goarch>.{tar.gz,zip}`.
      # macOS archives get re-packed after rcodesign signs the binary in place.
      - name: Stage + sign release artifacts
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          ENTITLEMENTS: ${{ github.workspace }}/runner/build/darwin/entitlements.plist
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          mkdir -p release-staging
          sign_script="${GITHUB_WORKSPACE}/runner/build/scripts/sign-darwin.sh"

          for arch in bazel-bin/runner/cmd/runner/agentsmesh-runner_*.tar.gz \
                     bazel-bin/runner/cmd/runner/agentsmesh-runner_*.zip; do
              base="$(basename "$arch")"
              new_name="${base/agentsmesh-runner_/agentsmesh-runner_${version}_}"
              dest="${GITHUB_WORKSPACE}/release-staging/${new_name}"

              # macOS binaries need rcodesign before being repacked. Linux /
              # Windows archives pass through unchanged.
              if [[ "$base" == *darwin*.tar.gz ]]; then
                  tmp="$(mktemp -d)"
                  tar -xzf "$arch" -C "$tmp"
                  (cd "$tmp" && "$sign_script" agentsmesh-runner)
                  tar -C "$tmp" -czf "$dest" agentsmesh-runner README.md LICENSE
                  rm -rf "$tmp"
              else
                  cp "$arch" "$dest"
              fi
          done

          # Recompute checksums.txt against the FINAL staged archives. The
          # Bazel-emitted checksums.txt is invalid for darwin entries
          # (re-packed after signing) and uses the pre-rename names.
          # `sha256sum` (GNU coreutils) is preinstalled on ubuntu-latest;
          # macOS runners don't run this job, so no `shasum` fallback needed.
          (
              cd release-staging
              sha256sum agentsmesh-runner_*.tar.gz agentsmesh-runner_*.zip > checksums.txt
          )
          ls -la release-staging/
          cat release-staging/checksums.txt

      # Generate the release notes from `git log` between the previous
      # tag and this one. Replaces GoReleaser's `changelog:` block —
      # same conventional-commit grouping, no extra tooling.
      - name: Generate changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || echo "")"
          {
            echo "## AgentsMesh Runner v${version}"
            echo ""
            echo "AgentsMesh Runner is an AI Agent task executor that connects to the AgentsMesh server and executes AI agent tasks in isolated terminal environments."
            echo ""
            echo "### Quick Install"
            echo ""
            echo '**macOS / Linux (one-line):**'
            echo '```bash'
            echo 'curl -fsSL https://agentsmesh.ai/install.sh | sh'
            echo '```'
            echo ""
            echo '**Windows (PowerShell):**'
            echo '```powershell'
            echo 'irm https://agentsmesh.ai/install.ps1 | iex'
            echo '```'
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "### Changes since ${previous_tag}"
              echo ""
              # Conventional-commit groups, mirroring the old goreleaser config.
              for prefix in "feat" "fix" "perf"; do
                title=""
                case "$prefix" in
                  feat) title="### New Features" ;;
                  fix) title="### Bug Fixes" ;;
                  perf) title="### Performance" ;;
                esac
                entries="$(git log "${previous_tag}..${GITHUB_REF}" --pretty=format:'- %s' | grep -E "^- ${prefix}(\(.+\))?!?:" || true)"
                if [[ -n "$entries" ]]; then
                  echo "$title"
                  echo ""
                  echo "$entries"
                  echo ""
                fi
              done
            fi
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          # `gh release create` is idempotent on tag re-runs (returns 0 + a
          # warning if the release already exists). Pre-release detection
          # mirrors goreleaser's `prerelease: auto` (anything with a `-`).
          prerelease_flag=""
          if [[ "$version" == *-* ]]; then
              prerelease_flag="--prerelease"
          fi
          gh release create "${GITHUB_REF#refs/tags/}" \
              --title "AgentsMesh Runner v${version}" \
              --notes-file release-notes.md \
              $prerelease_flag \
              release-staging/*

  # ===========================================================================
  # Build AgentsMesh Desktop installers (tag only)
  # Per-OS matrix because electron-builder calls native packagers
  # (`hdiutil` on macOS, `nsis` on Windows, AppImage on Linux). Output
  # is uploaded as a Release asset alongside the Runner CLI.
  #
  # `needs: [release]` because we attach desktop installers to the same
  # GitHub Release the runner CLI created — `gh release upload` requires
  # the release to already exist. `--clobber` makes it idempotent on
  # rerun.
  # ===========================================================================

  desktop-package:
    name: Desktop ${{ matrix.os.label }}
    needs: [release]
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - label: macOS
            runner: macos-14
            # Only the .dmg is shipped today. `.zip` + `latest-mac.yml`
            # drive electron-updater autoupdate, but the `.app` inside
            # the zip is NOT yet stapled (notarization re-pack pipeline
            # is dmg-only). Re-enable once the zip-restaple flow lands
            # — until then autoupdate stays disabled to avoid shipping
            # un-notarized .app over the update channel.
            installers: |
              AgentsMesh-*.dmg
          - label: Windows
            runner: windows-latest
            installers: |
              AgentsMesh*.exe
              latest.yml
          # Linux Desktop is intentionally not part of the matrix.
          # electron-builder pulls `fpm` (Ruby-based packager) for the
          # AppImage / .deb targets and hits a 7zip cache extraction
          # failure inside the Bazel sandbox path:
          #   `7za x ... ERROR: No more files / -2147024872`
          # End-users on Linux run the runner CLI (which we still ship
          # via `agentsmesh-runner_<TAG>_linux_*.tar.gz` from the
          # release job) plus the web client at agentsmesh.ai. No
          # Linux Electron product expectation today, so we drop the
          # matrix entry rather than maintain a Bazel-managed fpm
          # toolchain just for installer parity.
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # `electron_builder_app(version = ...)` writes into the synthesised
      # package.json that electron-builder consumes for installer file
      # names. Bazel's `write_file` can't read `--stamp` STABLE_* keys,
      # so we patch the literal at workflow time. The `DESKTOP_VERSION_STAMP`
      # marker in BUILD.bazel keys the sed to the next `version = "..."`
      # line, so bumping the dev placeholder doesn't drift the regex.
      - name: Stamp desktop version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          # `sed -E /marker/{n;s/.../.../}` — match marker, advance one
          # line (the `version =` line), substitute. Works on both BSD
          # (macOS runner) and GNU sed.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
              sed -i '' -E '/DESKTOP_VERSION_STAMP/{n;s/version = "[^"]+"/version = "'"$version"'"/;}' clients/desktop/BUILD.bazel
          else
              sed -i -E '/DESKTOP_VERSION_STAMP/{n;s/version = "[^"]+"/version = "'"$version"'"/;}' clients/desktop/BUILD.bazel
          fi
          grep -A1 DESKTOP_VERSION_STAMP clients/desktop/BUILD.bazel

      # `:dist` runs the full electron-vite + electron-builder pipeline.
      # Sandbox is bypassed for the action (hdiutil / nsis / AppImage
      # need real filesystem access), but Bazel's input/output graph
      # still tracks the closure. ~3:30 from cold cache, dominated by
      # the 100MB electron download.
      #
      # Signing matrix:
      #   macOS  — codesign identity from a temp keychain (.p12 import,
      #            see "Set up macOS signing keychain" step). Notarization
      #            runs in a separate `xcrun notarytool` step *outside*
      #            the bazel sandbox; electron-builder's internal notarize
      #            never reached @electron/notarize when launched through
      #            the bazel macro pipeline.
      #   Windows — CSC_LINK from WIN_CSC_LINK (Authenticode .pfx) +
      #             WIN_CSC_KEY_PASSWORD. electron-builder reuses the
      #             same env names cross-platform.
      #   Linux  — desktop matrix entry dropped; runner CLI ships the
      #            Linux story.
      #
      # Bazel's exec sandbox strips arbitrary host env from actions; the
      # `--action_env` flags below allowlist the signing vars so they
      # reach the electron-builder subprocess inside the action.
      # Set up macOS signing.
      #
      # v0.30.0–v0.30.3 all shipped ad-hoc-signed dmgs even after
      # switching CSC_LINK from base64 to a file path: electron-builder
      # invokes its `app-builder` subprocess from within the Bazel
      # action sandbox, and the CSC_LINK / CSC_KEY_PASSWORD pair was
      # silently swallowed somewhere along that chain (no errors, no
      # bullet logs visible — bazel captures action stdout). The
      # resulting .app/Contents/MacOS/* came out as
      # `Signature=adhoc, TeamIdentifier=not set`, spctl rejected,
      # no notarization ticket.
      #
      # The fix: import the `.p12` into a temporary keychain and let
      # electron-builder auto-discover the codesigning identity from
      # there. This is the canonical macOS CI signing pattern (used
      # by Apple's own examples + electron-builder docs) and removes
      # the env-var routing entirely. electron-builder picks up the
      # identity from `security find-identity` regardless of how the
      # subprocess was launched. CSC_LINK is then unnecessary; we
      # only keep `CSC_KEY_PASSWORD` for the keychain unlock during
      # the import step.
      - name: Set up macOS signing keychain + notarization API key
        if: matrix.os.runner == 'macos-14'
        shell: bash
        env:
          MACOS_CERT_B64: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_CERT_B64:-}" ]]; then
            echo "ERROR: MACOS_CERTIFICATE secret not set — desktop dmg/zip would ship ad-hoc-signed." >&2
            exit 1
          fi
          if [[ -z "${MACOS_CERT_PASSWORD:-}" ]]; then
            echo "ERROR: MACOS_CERTIFICATE_PASSWORD secret not set." >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/apple"

          # Decode and import .p12 into a fresh keychain. The keychain
          # password is per-run (random), the cert password is the
          # secret. `-A` makes the imported key accessible to any
          # codesigning tool without per-tool partition prompts.
          KEYCHAIN_PATH="$RUNNER_TEMP/apple/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          CERT_PATH="$RUNNER_TEMP/apple/cert.p12"

          echo "$MACOS_CERT_B64" | base64 --decode > "$CERT_PATH"
          chmod 0600 "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the temp keychain the default + first in the search
          # list. electron-builder shells out to `codesign`, which
          # walks the user keychain list to locate Developer ID
          # identities; without prepending the temp keychain it
          # only sees the default user keychain (empty on a fresh
          # GH runner) and signs ad-hoc.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security default-keychain -s "$KEYCHAIN_PATH"

          # Confirm the identity is visible. Failure here means the
          # .p12 didn't import (wrong password, wrong format) — we
          # want to bail loudly rather than ship ad-hoc.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "ERROR: no Developer ID Application identity found after .p12 import." >&2
            exit 1
          fi

          # Notarization API key — `@electron/notarize` reads it as a
          # filesystem path, never raw bytes.
          if [[ -z "${APPLE_API_KEY_B64:-}" ]]; then
            echo "WARN: APPLE_API_KEY secret not set — notarization will be skipped (Gatekeeper will require user approval on first launch)." >&2
            exit 0
          fi
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/apple/AuthKey.p8"
          chmod 0600 "$RUNNER_TEMP/apple/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build :dist (macOS)
        if: matrix.os.runner == 'macos-14'
        shell: bash
        run: |
          bazel build //clients/desktop:dist \
            --build_tag_filters=electron_builder \
            --action_env=APPLE_API_KEY \
            --action_env=APPLE_API_KEY_ID \
            --action_env=APPLE_API_KEY_ISSUER_ID
        env:
          # `APPLE_API_KEY` is exported via $GITHUB_ENV by the
          # staging step above (filesystem path to .p8). The `.p12`
          # import is in the default keychain, so electron-builder's
          # codesign subprocess discovers the Developer ID identity
          # via `security find-identity` without any env-var routing.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          # `@electron/notarize` reads `APPLE_API_KEY_ISSUER_ID`, not
          # the truncated `APPLE_API_ISSUER` variant — using the wrong
          # name silently disabled notarization in v0.30.0–v0.30.2.
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}

      # electron-builder 25.x's `mac.notarize` config never reached
      # @electron/notarize when invoked through the Bazel macro pipeline:
      # v0.30.5 dmg shipped signed-but-not-notarized despite explicit
      # `mac.notarize: { teamId: ... }` in electron-builder.yml. Likely
      # the .p8 file path leaks across the bazel exec sandbox boundary
      # (the file lives in $RUNNER_TEMP, outside the sandbox closure).
      #
      # Rather than chase electron-builder + bazel-sandbox interactions,
      # we drive notarization ourselves via `xcrun notarytool` from the
      # host shell — outside the sandbox, with the .p8 fully readable.
      # Apple's `notarytool` binary handles the App Store Connect API
      # upload + polling; `xcrun stapler staple` then attaches the
      # ticket to the dmg for offline Gatekeeper verification.
      #
      # The dmg is staged into $RUNNER_TEMP/installers because bazel-bin
      # outputs are read-only — `stapler staple` modifies the dmg in
      # place. `cp -aR` preserves macOS extended attributes (xattrs)
      # which carry the codesign signature; using a plain `cp` would
      # invalidate the signature and notarization would reject.
      - name: Notarize macOS dmg via notarytool
        if: matrix.os.runner == 'macos-14'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY:-}" ]]; then
            echo "::error::APPLE_API_KEY unset — refuse to ship un-notarized dmg." >&2
            exit 1
          fi

          DIST="bazel-bin/clients/desktop/dist"
          STAGE="$RUNNER_TEMP/installers"
          mkdir -p "$STAGE"

          cp -aR "$DIST"/. "$STAGE"/
          chmod -R u+w "$STAGE"

          shopt -s nullglob
          dmgs=("$STAGE"/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "::error::no .dmg found under $STAGE after staging." >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Submitting $dmg to Apple Notary..."
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_KEY_ISSUER_ID" \
              --wait \
              --timeout 30m
            echo "Stapling ticket to $dmg..."
            xcrun stapler staple "$dmg"
          done

      # Fail-fast assertion: every prior release silently shipped
      # ad-hoc-signed dmgs because electron-builder's logs are
      # captured by bazel and we couldn't see signing fall back to
      # ad-hoc. Verify the staged + stapled dmg before the upload
      # step so a sign/notarize regression turns into a CI failure
      # instead of a Gatekeeper-rejected user install.
      - name: Verify macOS dmg signing + notarization
        if: matrix.os.runner == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/installers"
          shopt -s nullglob
          dmgs=("$STAGE"/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "::error::no .dmg found under $STAGE." >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Inspecting $dmg"
            # codesign on the dmg itself proves Developer ID identity
            # is wired (electron-builder signs the dmg as a separate
            # bundle from the .app inside).
            if codesign -dv "$dmg" 2>&1 | grep -q "Signature=adhoc"; then
              echo "::error::$dmg is ad-hoc-signed; the codesign identity didn't reach electron-builder." >&2
              exit 1
            fi
            # Staple ticket present? — proves notarytool ran and
            # Apple accepted. `xcrun stapler validate` exits 0 when
            # the ticket is attached (and prints "The validate action
            # worked!" — note: NOT "validated", that string never
            # appears in the success path; v0.30.6 hit this exact
            # grep mismatch). Use the exit code, not stdout text.
            if ! xcrun stapler validate "$dmg"; then
              echo "::error::$dmg has no stapled notarization ticket." >&2
              exit 1
            fi
            # spctl is the gold standard: simulates the Gatekeeper
            # check the user's Mac runs at first launch. Exit 0 ⇒
            # "accepted source=Notarized Developer ID"; non-zero ⇒
            # rejected.
            if ! spctl -a -t open --context context:primary-signature -v "$dmg"; then
              echo "::error::spctl --assess rejected $dmg." >&2
              exit 1
            fi
            echo "OK: $dmg is signed + notarized + stapled."
          done

      - name: Build :dist (Windows)
        if: matrix.os.runner == 'windows-latest'
        shell: bash
        run: |
          bazel build //clients/desktop:dist \
            --build_tag_filters=electron_builder \
            --action_env=CSC_LINK \
            --action_env=CSC_KEY_PASSWORD
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build :dist (Linux)
        if: matrix.os.runner == 'ubuntu-latest'
        shell: bash
        run: bazel build //clients/desktop:dist --build_tag_filters=electron_builder

      # Attach installers + electron-updater metadata to the GitHub
      # Release the `release` job created. Single matrix shard's worth
      # per call; `--clobber` lets reruns overwrite without erroring.
      #
      # macOS reads from `$RUNNER_TEMP/installers` because the Notarize
      # step staged + stapled the dmg there (bazel-bin is read-only,
      # so `stapler staple` couldn't modify the dmg in-place). Windows
      # reads straight from bazel-bin since there's no post-build step
      # mutating the .exe.
      #
      # `GH_REPO` short-circuits gh CLI's git-remote inference. Without
      # it, gh runs `git config --get remote.origin.url` from the
      # `working-directory` (a bazel-out subdir, not a git checkout) and
      # fails with `not a git repository`. v0.30.0 hit this on macOS:
      # dmg/zip built fine, upload to release errored at the very end.
      - name: Upload installers to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        working-directory: ${{ matrix.os.runner == 'macos-14' && format('{0}/installers', runner.temp) || 'bazel-bin/clients/desktop/dist' }}
        run: |
          set -euo pipefail
          ls -la
          tag="${GITHUB_REF#refs/tags/}"
          files=()
          while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              for f in $pattern; do
                  [ -f "$f" ] && files+=("$f")
              done
          done <<< "${{ matrix.os.installers }}"
          if [ ${#files[@]} -eq 0 ]; then
              echo "ERROR: no installers matched any pattern; refusing to noop." >&2
              exit 1
          fi
          echo "Uploading: ${files[*]}"
          gh release upload "$tag" --clobber "${files[@]}"
